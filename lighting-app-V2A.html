    const t=timeScaleVal/50-1; // -1 to +1
    let scale;
    if(t<0) scale=1+(-t)*4; // slower
    else scale=1/(1+t*4);   // faster
    const sel=cues.filter(c=>selectedCues.has(c.id));
    if(sel.length===0) return [];
    const minBeat=Math.min(...sel.map(c=>c.beat));

  // Helper: compute fan t value based on direction: ">>" linear spread, "><" center spread
  const fanT=(i,n,dir)=>{if(n<2)return 0;const lin=i/(n-1);if(dir==="><")return 1-Math.abs(2*lin-1);return lin;};
  useEffect(()=>{window.__LUM={setSelectedCues,setFanSliderOpen,setFanVal,setFanDir,cues,fixtures,selectedCues,setPopupPos,setCues};},[cues,fixtures,selectedCues]);

    const sel=cues.filter(c=>selectedCues.has(c.id));
    if(sel.length<2) return [];
    const amt=(fanVal-50)/50; // -1 to +1
    const fxIdx={};fixtures.forEach((fx,i)=>{fxIdx[fx.id]=i;});
    const groups={};
    sel.forEach(c=>{if(!groups[c.param])groups[c.param]=[];groups[c.param].push(c);});
    const result=[];
    Object.values(groups).forEach(g=>{
      const p=getParam(g[0].param);
      if(!p){g.forEach(c=>result.push({...c,id:"fg-"+c.id}));return;}
      const uniqFx=[...new Set(g.map(c=>c.fixtureId))].sort((a,b)=>(fxIdx[a]??0)-(fxIdx[b]??0));
      if(uniqFx.length<2){g.forEach(c=>result.push({...c,id:"fg-"+c.id}));return;}
      // Work in DMX space (0-255) for consistent spread across all param types
      const toDmx=v=>((v-p.min)/(p.max-p.min))*255;
      const toNative=d=>(d/255)*(p.max-p.min)+p.min;
      const fxFanT={};
      if(fanDir==="><"){
        // CENTER mode: symmetric spread — center fixture stays, edges deviate equally
        uniqFx.forEach((fId,i)=>{const lin=uniqFx.length>1?(2*i/(uniqFx.length-1)-1):0;fxFanT[fId]=Math.sign(lin)*lin*lin;});
        g.forEach(c=>{
          const signed=fxFanT[c.fixtureId]??0; // quadratic -1 to +1
          const dmxOrig=toDmx(c.value);
          const maxDev=Math.min(dmxOrig,255-dmxOrig); // symmetric headroom
          const offset=signed*maxDev*amt;
          const dmxFanned=Math.max(0,Math.min(255,dmxOrig+offset));
          const clamped=Math.max(p.min,Math.min(p.max,Math.round(toNative(dmxFanned))));
          result.push({...c,id:"fg-"+c.id,value:clamped});
        });
      } else {
        // SPREAD mode: >> = last fixture stays, << = first fixture stays
        uniqFx.forEach((fId,i)=>{fxFanT[fId]=uniqFx.length>1?(fanDir==="<<"?i/(uniqFx.length-1):1-i/(uniqFx.length-1)):0;});

          const clamped=Math.max(p.min,Math.min(p.max,Math.round(toNative(dmxFanned))));
          result.push({...c,id:"fg-"+c.id,value:clamped});

        const fillEnd = START + pct * SWEEP;
        const trackPath = arcD(START, START+SWEEP, R);
        const fillPath = pct > 0.01 ? arcD(START, fillEnd, R) : null;
        const [tikX1,tikY1] = pt(fillEnd, R-14);
        const [tikX2,tikY2] = pt(fillEnd, R-5);

        const onKnobDown = (e) => {
          e.preventDefault(); e.stopPropagation();
          const sy=e.clientY, sv=curNum, range=pMax-pMin;
          const mv = (me) => setDisplayLive(sv + (sy - me.clientY) * (range/180));
          const up = () => { document.removeEventListener('pointermove',mv); document.removeEventListener('pointerup',up); };
          document.addEventListener('pointermove', mv, {passive:false});
          document.addEventListener('pointerup', up);
        };

        const kBtn = {minHeight:48,fontSize:17,fontWeight:'bold',background:'#1e2330',
                      border:'1px solid #2e3448',color:'#dde',borderRadius:9,
                      cursor:'pointer',fontFamily:'monospace',touchAction:'manipulation'};
        return (
          <div style={{position:'fixed',inset:0,zIndex:10002,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setKeypadState(null)}>
            <div onClick={e=>e.stopPropagation()}
                 style={{width:228,
                         background:'#12151e',border:'2px solid '+color+'66',
                         borderRadius:14,boxShadow:'0 16px 56px rgba(0,0,0,0.96), 0 0 0 1px '+color+'33',
                         padding:14,display:'flex',flexDirection:'column',gap:7}}>
              {/* Header */}
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <span style={{fontSize:11,color,fontWeight:'bold',letterSpacing:1}}>{label}</span>
                <span style={{fontSize:9,color:'#556'}}>{pMin} – {pMax}</span>
              </div>
              {/* Knob */}
              <div style={{display:'flex',justifyContent:'center',background:'#0c0f16',borderRadius:12,padding:'10px 0'}}>
                <svg width="128" height="128" style={{cursor:'ns-resize',touchAction:'none',userSelect:'none',overflow:'visible'}}
                     onPointerDown={onKnobDown}>
                  <circle cx={CX} cy={CY} r={R+12} fill="#0a0c13" stroke="rgba(255,255,255,0.06)" strokeWidth="1"/>
                  <path d={trackPath} fill="none" stroke="rgba(255,255,255,0.18)" strokeWidth="10" strokeLinecap="round"/>
                  {fillPath && <path d={fillPath} fill="none" stroke={color} strokeWidth="10" strokeLinecap="round"
                        style={{filter:`drop-shadow(0 0 6px ${color})`}}/>}
                  <circle cx={CX} cy={CY} r={R-14} fill="#12151e" stroke={color+'44'} strokeWidth="1.5"/>
                  <line x1={tikX1.toFixed(1)} y1={tikY1.toFixed(1)} x2={tikX2.toFixed(1)} y2={tikY2.toFixed(1)}
                        stroke={color} strokeWidth="3" strokeLinecap="round"/>
                  <text x={CX} y={CY+7} textAnchor="middle" fontSize="18" fontWeight="bold"
                        fill={color} fontFamily="monospace">{curNum}</text>
                  <text x={CX} y={CY+21} textAnchor="middle" fontSize="7.5"
                        fill="rgba(255,255,255,0.25)" fontFamily="monospace">drag ↕</text>
                </svg>
              </div>
              {/* Display */}
              <div style={{background:'#0c0f16',border:'1px solid '+color+'44',borderRadius:9,
                           padding:'6px 12px',fontSize:22,color,fontFamily:'monospace',
                           textAlign:'right',letterSpacing:4,minHeight:34}}>
                {keypadState.value || '1'}
              </div>
              {/* Numpad */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:5,direction:'ltr'}}>
                {[1,2,3,4,5,6,7,8,9].map(d=>(
                  <button key={d} onClick={()=>kpPress(String(d))} style={kBtn}>{d}</button>
                ))}
                <button onClick={()=>setDisplayLive(pMin)} style={{...kBtn,fontSize:10,color:'#778',border:'1px solid #2a2e3c'}}>ZERO</button>
                <button onClick={()=>kpPress('0')} style={kBtn}>0</button>
                <button onClick={kpBack} style={{...kBtn,fontSize:15,color:'#99a',border:'1px solid #2a2e3c'}}>⌫</button>
              </div>
              {/* FULL / ZERO */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5}}>
                <button onClick={()=>setDisplayLive(pMax)}
                        style={{minHeight:40,fontSize:10,fontWeight:'bold',background:'#0e1c10',
                                border:'1px solid #44ff7755',color:'#44ff77',borderRadius:9,
                                cursor:'pointer',touchAction:'manipulation'}}>FULL {pMax}</button>
                <button onClick={()=>setDisplayLive(pMin)}
                        style={{minHeight:40,fontSize:10,fontWeight:'bold',background:'#1a0e1e',
                                border:'1px solid #aa55cc55',color:'#aa66cc',borderRadius:9,
                                cursor:'pointer',touchAction:'manipulation'}}>ZERO {pMin}</button>
              </div>
              {/* SET / REL */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5}}>
                <button onClick={applyAndClose}
                        style={{minHeight:44,fontSize:12,fontWeight:'bold',background:color+'28',
                                border:'2px solid '+color,color,borderRadius:9,cursor:'pointer',touchAction:'manipulation'}}>SET</button>
                <button onClick={()=>setKeypadState(null)}
                        style={{minHeight:44,fontSize:12,fontWeight:'bold',background:'#1a0a0a',
                                border:'2px solid #ff4455',color:'#ff4455',borderRadius:9,cursor:'pointer',touchAction:'manipulation'}}>REL</button>
              </div>
            </div>
          </div>
        );
      })()}
      {keypadState && keypadState.field==='fixture_name' && (() => {
        const color = '#44aaff';
        const caps = keypadState.caps !== false;
        const applyName = (val) => {
          const name = val.trim() || ('Fixture ' + keypadState.fxId);
          setFixtures(prev => prev.map(f => f.id === keypadState.fxId ? {...f, name} : f));
          setKeypadState(null);
        };
        const kbRows = [
          ['1','2','3','4','5','6','7','8','9','0'],
          ['Q','W','E','R','T','Y','U','I','O','P'],
          ['A','S','D','F','G','H','J','K','L'],
          ['Z','X','C','V','B','N','M']
        ];
        const kbPress = (ch) => setKeypadState(prev => ({...prev, value: prev.value + (prev.caps !== false ? ch : ch.toLowerCase())}));
        const kbBack = () => setKeypadState(prev => ({...prev, value: prev.value.slice(0, -1)}));
        const kbClear = () => setKeypadState(prev => ({...prev, value: ''}));
        const kbSpace = () => setKeypadState(prev => ({...prev, value: prev.value + ' '}));
        const kbCaps = () => setKeypadState(prev => ({...prev, caps: prev.caps === false ? true : false}));
        const btnStyle = {minWidth:42,minHeight:42,padding:"10px 0",fontSize:16,fontWeight:"bold",background:"#1a1e28",border:"1px solid #252930",color:"#ddd",borderRadius:8,cursor:"pointer",fontFamily:"monospace",flex:1};

                <div style={{flex:1,background:"#080a0e",border:"1px solid "+color+"44",borderRadius:8,padding:"6px 10px",fontSize:16,color:color,fontFamily:"monospace",minHeight:24,letterSpacing:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{keypadState.value||<span style={{color:color+"44"}}>...</span>}</div>
              </div>
              {kbRows.map((row, ri) => (
                <div key={ri} style={{display:"flex",gap:3,justifyContent:"center"}}>
                  {ri===3 && <button onClick={kbCaps} style={{...btnStyle,minWidth:50,fontSize:9,background:caps?"#1a2a3a":"#1a1e28",border:"1px solid "+(caps?"#44aaff66":"#252930"),color:caps?"#44aaff":"#666",letterSpacing:1}}>CAPS</button>}
                  {row.map(ch => (
                    <button key={ch} onClick={()=>kbPress(ch)} style={btnStyle}>{caps ? ch : ch.toLowerCase()}</button>
                  ))}
                  {ri===3 && <button onClick={kbBack} style={{...btnStyle,minWidth:50,fontSize:15,color:"#888"}}>&#9003;</button>}
                </div>
              ))}
              <div style={{display:"flex",gap:3,justifyContent:"center"}}>
                <button onClick={kbClear} style={{...btnStyle,minWidth:52,fontSize:11,background:"#1c0a0a",border:"1px solid #ff333344",color:"#ff5544",letterSpacing:1}}>CLR</button>
                <button onClick={()=>kbPress('-')} style={btnStyle}>-</button>
                <button onClick={()=>kbPress('_')} style={btnStyle}>_</button>
                <button onClick={()=>kbPress('.')} style={btnStyle}>.</button>
                <button onClick={kbSpace} style={{...btnStyle,flex:4,fontSize:10,color:"#666",letterSpacing:2}}>SPACE</button>
                <button onClick={()=>applyName(keypadState.value)} style={{...btnStyle,flex:2,fontSize:12,background:"#0a1a0a",border:"1px solid #44ffaa66",color:"#44ffaa",letterSpacing:2}}>ENTER</button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Unified Lumina Popup */}
      {luminaMenuOpen && (
        <div onMouseDown={e=>e.stopPropagation()} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",zIndex:10002,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>{if(updateStatus!=='applying'&&updateStatus!=='restarting')setLuminaMenuOpen(false);}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#0e1018",border:"1px solid #cc994444",borderRadius:8,width:520,height:420,boxShadow:"0 8px 40px rgba(0,0,0,0.8)",display:"flex",flexDirection:"column"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 20px 0"}}>

            </div>
            <div style={{display:"flex",gap:0,borderBottom:"1px solid #252930",margin:"10px 0 0"}}>
              {[{id:'load',label:'LOAD'},{id:'save',label:'SAVE'},{id:'update',label:'UPDATE'}].map(t=>(
                <button key={t.id} onClick={()=>{setLuminaTab(t.id);if(t.id==='load')handleShowLoad();if(t.id==='save')handleShowSave();if(t.id==='update'){setUpdateStatus(null);setUpdateInfo(null);setUpdateError('');setUpdateProgress('');}}} style={{flex:1,padding:"10px 0",fontSize:11,fontWeight:"bold",letterSpacing:2,background:luminaTab===t.id?"#0e1018":"#080a10",borderTop:luminaTab===t.id?"2px solid #cc9944":"2px solid transparent",borderLeft:"none",borderRight:t.id!=='update'?"1px solid #1e222a":"none",borderBottom:luminaTab===t.id?"none":"1px solid #252930",color:luminaTab===t.id?"#cc9944":"#555",cursor:"pointer",marginBottom:luminaTab===t.id?-1:0}}>{t.label}</button>
              ))}
            </div>
            <div style={{padding:16,display:"flex",flexDirection:"column",gap:12,flex:1,overflowY:"auto",minHeight:0}}>

            {/* === LOAD TAB === */}
            {luminaTab==='load' && <>
              <div style={{display:"flex",gap:0,borderBottom:"1px solid #1e222a"}}>
                {[{id:'local',label:'LOCAL'},{id:'usb',label:'USB'},{id:'community',label:'COMMUNITY'}].map(s=>(
                  <button key={s.id} onClick={()=>{setLoadSource(s.id);if(s.id==='usb')loadUsbShows();if(s.id==='community'&&ghFiles.length===0)loadFromGitHub();}} style={{flex:1,padding:"6px 0",fontSize:9,fontWeight:"bold",letterSpacing:1,background:loadSource===s.id?"#0e1018":"#080a10",borderTop:loadSource===s.id?"2px solid #4488ff":"2px solid transparent",borderLeft:"none",borderRight:s.id!=='community'?"1px solid #1a1d22":"none",borderBottom:loadSource===s.id?"none":"1px solid #1e222a",color:loadSource===s.id?"#4488ff":"#444",cursor:"pointer",marginBottom:loadSource===s.id?-1:0}}>{s.label}</button>
                ))}
              </div>
              <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:2}}>
              {loadSource==='local' && <>
                <div style={{display:"flex",gap:4,marginBottom:4}}>
                  <input type="text" placeholder="Search shows..." value={showSearchFilter} onChange={e=>setShowSearchFilter(e.target.value)} style={{flex:1,background:"#080a0e",border:"1px solid #4488ff44",color:"#4488ff",borderRadius:8,padding:"8px 12px",fontSize:14,fontWeight:"bold",letterSpacing:1,outline:"none"}}/>
                  <button onClick={()=>setLuminaKbTarget(luminaKbTarget==='search'?null:'search')} style={{background:luminaKbTarget==='search'?"#4488ff22":"#0c0e12",border:"1px solid "+(luminaKbTarget==='search'?"#4488ff":"#252930"),color:luminaKbTarget==='search'?"#4488ff":"#555",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:16}}>⌨</button>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:2,alignItems:"center",padding:"4px 0"}}>
                  {loadDialogDir.split('/').filter(Boolean).map((seg,i,arr)=>(
                    <React.Fragment key={i}>
                      {i>0 && <span style={{color:"#333",fontSize:10}}>›</span>}
                      <span style={{fontSize:9,color:i===arr.length-1?"#4488ff":"#555",fontWeight:i===arr.length-1?"bold":"normal",letterSpacing:1}}>{seg}</span>
                    </React.Fragment>
                  ))}
                </div>
                {loadDialogShows.filter(s=>!showSearchFilter||s.showName.toLowerCase().includes(showSearchFilter.toLowerCase())||s.filename.toLowerCase().includes(showSearchFilter.toLowerCase())).length === 0 && <div style={{padding:20,textAlign:"center",fontSize:11,color:"#444"}}>No shows found</div>}
                {loadDialogShows.filter(s=>!showSearchFilter||s.showName.toLowerCase().includes(showSearchFilter.toLowerCase())||s.filename.toLowerCase().includes(showSearchFilter.toLowerCase())).map((show, idx) => (
                  <div key={(show.folder||'')+'/'+show.filename+idx} onClick={()=>{loadShowFromServer(show.folder, show.filename);setLuminaMenuOpen(false);}} style={{padding:"10px 14px",background:"#0a0c12",border:"1px solid #1e222a",borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",gap:12}} onMouseEnter={e=>e.currentTarget.style.borderColor="#4488ff44"} onMouseLeave={e=>e.currentTarget.style.borderColor="#1e222a"}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:"bold",color:"#4488ff"}}>{show.showName}</div>
                      <div style={{fontSize:8,color:"#555",marginTop:2}}>{show.folder ? "📁 "+show.folder : show.filename}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:9,color:"#666"}}>{(show.size/1024).toFixed(0)} KB</div>
                      <div style={{fontSize:8,color:"#444"}}>{new Date(show.modified).toLocaleDateString()} {new Date(show.modified).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
                    </div>
                  </div>
                ))}
              </>}
              {loadSource==='usb' && <>
                {usbLoading && <div style={{padding:20,textAlign:"center",fontSize:11,color:"#4488ff"}}>Scanning drives...</div>}
                {!usbLoading && usbDrives.length === 0 && <div style={{padding:20,textAlign:"center",fontSize:11,color:"#444"}}>No USB drives detected</div>}

                  {usbDrives.map(d=>(
                    <div key={d.name} style={{padding:"10px 14px",background:"#0a0c12",border:"1px solid #1e222a",borderRadius:8,display:"flex",alignItems:"center",gap:10}}>

                        <div style={{fontSize:12,fontWeight:"bold",color:"#4488ff"}}>{d.name}</div>

                      <span style={{fontSize:9,color:"#666"}}>No show files</span>
                    </div>
                  ))}
                </div>}
                {!usbLoading && usbShows.map((show, idx) => (
                  <div key={show.path+idx} onClick={()=>{loadShowFromUsb(show.path);setLuminaMenuOpen(false);}} style={{padding:"10px 14px",background:"#0a0c12",border:"1px solid #1e222a",borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",gap:12}} onMouseEnter={e=>e.currentTarget.style.borderColor="#4488ff44"} onMouseLeave={e=>e.currentTarget.style.borderColor="#1e222a"}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:"bold",color:"#4488ff"}}>{show.showName}</div>

              {loadSource==='community' && <>
                <div style={{display:"flex",gap:6,padding:"4px 0"}}>

                </div>
                {ghLoading && <div style={{padding:16,textAlign:"center",fontSize:11,color:"#4488ff"}}>Loading...</div>}
                {ghError && <div style={{padding:10,fontSize:10,color:"#ff5544",background:"#2a1010",border:"1px solid #ff554444",borderRadius:4}}>{ghError}</div>}
                {ghFiles.map(f=>(
                  <div key={f.name} onClick={()=>{loadGhFile(f);setLuminaMenuOpen(false);}} style={{padding:"10px 14px",background:"#0a0c12",border:"1px solid #1e222a",borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",gap:12}} onMouseEnter={e=>e.currentTarget.style.borderColor="#4488ff44"} onMouseLeave={e=>e.currentTarget.style.borderColor="#1e222a"}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:"bold",color:"#4488ff"}}>{f.name.replace(/\.(json|lumina)$/,'')}</div>
                      <div style={{fontSize:8,color:"#555",marginTop:2}}>{f.name}</div>
                    </div>
                    <div style={{fontSize:9,color:"#666"}}>{(f.size/1024).toFixed(0)} KB</div>
                  </div>
                ))}
              </>}
              </div>
            </>}

            {/* === SAVE TAB === */}
            {luminaTab==='save' && <>
              <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:4}}>
                <span style={{fontSize:9,color:"#555",letterSpacing:1}}>SHOW NAME</span>
                <div style={{display:"flex",gap:4}}>
                  <input type="text" value={saveDialogName} onChange={e=>setSaveDialogName(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&saveDialogName.trim())doSaveShow(saveDialogName.trim());}} autoFocus style={{flex:1,background:"#080a0e",border:"1px solid #44ffaa44",color:"#44ffaa",borderRadius:8,padding:"8px 12px",fontSize:14,fontWeight:"bold",letterSpacing:1,outline:"none"}} placeholder="my-show"/>
                  <button onClick={()=>setLuminaKbTarget(luminaKbTarget==='saveName'?null:'saveName')} style={{background:luminaKbTarget==='saveName'?"#44ffaa22":"#0c0e12",border:"1px solid "+(luminaKbTarget==='saveName'?"#44ffaa":"#252930"),color:luminaKbTarget==='saveName'?"#44ffaa":"#555",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:16}}>⌨</button>
                </div>
              </div>
              <div style={{display:"flex",gap:0,borderBottom:"1px solid #1e222a"}}>
                {[{id:'local',label:'LOCAL'},{id:'usb',label:'USB'},{id:'community',label:'COMMUNITY'}].map(s=>(
                  <button key={s.id} onClick={()=>{setSaveSource(s.id);if(s.id==='usb')loadUsbShows();}} style={{flex:1,padding:"6px 0",fontSize:9,fontWeight:"bold",letterSpacing:1,background:saveSource===s.id?"#0e1018":"#080a10",borderTop:saveSource===s.id?"2px solid #44ffaa":"2px solid transparent",borderLeft:"none",borderRight:s.id!=='community'?"1px solid #1a1d22":"none",borderBottom:saveSource===s.id?"none":"1px solid #1e222a",color:saveSource===s.id?"#44ffaa":"#444",cursor:"pointer",marginBottom:saveSource===s.id?-1:0}}>{s.label}</button>
                ))}
              </div>
              <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:2}}>
              {saveSource==='local' && <>
                <div style={{display:"flex",gap:4,marginBottom:4}}>
                  <input type="text" placeholder="Search shows..." value={showSearchFilter} onChange={e=>setShowSearchFilter(e.target.value)} style={{flex:1,background:"#080a0e",border:"1px solid #44ffaa44",color:"#44ffaa",borderRadius:8,padding:"8px 12px",fontSize:14,fontWeight:"bold",letterSpacing:1,outline:"none"}}/>
                  <button onClick={()=>setLuminaKbTarget(luminaKbTarget==='search'?null:'search')} style={{background:luminaKbTarget==='search'?"#44ffaa22":"#0c0e12",border:"1px solid "+(luminaKbTarget==='search'?"#44ffaa":"#252930"),color:luminaKbTarget==='search'?"#44ffaa":"#555",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:16}}>⌨</button>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:2,alignItems:"center",padding:"4px 0"}}>
                  {loadDialogDir.split('/').filter(Boolean).map((seg,i,arr)=>(
                    <React.Fragment key={i}>
                      {i>0 && <span style={{color:"#333",fontSize:10}}>›</span>}
                      <span style={{fontSize:9,color:i===arr.length-1?"#44ffaa":"#555",fontWeight:i===arr.length-1?"bold":"normal",letterSpacing:1}}>{seg}</span>
                    </React.Fragment>
                  ))}
                  <div style={{flex:1}}/>
                  <button onClick={()=>{if(saveDialogName.trim()){doSaveShow(saveDialogName.trim());setLuminaMenuOpen(false);}}} style={{padding:"4px 14px",fontSize:9,fontWeight:"bold",letterSpacing:1,background:"#0a2a1a",border:"1px solid #44ffaa66",color:"#44ffaa",borderRadius:8,cursor:"pointer"}}>SAVE</button>

                <button onClick={()=>{

                  const selected = mvrFixtures.filter(f => mvrSelected.has(f.uuid));
                  const maxId = fixtures.reduce((m,f) => Math.max(m, f.id), 0);
                  const newFixtures = [];
                  const newPatch = {...dmxPatch};

                  // Use fixture library for profile matching
                  const libData = fixtureLibraryData;

                  selected.forEach((mvr, idx) => {
                    const fxId = maxId + 1 + idx;
                    // Profile matching: model key → existing profiles → library → generic

                    const allProfiles = Object.keys(DMX_PROFILES).filter(p => !hiddenProfiles.has(p));

                    // Tier 1: exact model match in DMX_PROFILES
                    if (modelKey && DMX_PROFILES[modelKey]) profileName = modelKey;
                    // Tier 1b: try manufacturer_model
                    if (!profileName) {
                      const mfrModelKey = ((mvr.manufacturer || '') + '_' + (mvr.model || '')).toUpperCase().replace(/[^A-Z0-9]/g, '_');
                      if (DMX_PROFILES[mfrModelKey]) profileName = mfrModelKey;

                    // Tier 2: search fixture library by manufacturer+model
                    if (!profileName && libData && libData.manufacturers) {
                      const mfrKey = Object.keys(libData.manufacturers).find(k => {
                        const mfrName = (libData.manufacturers[k].name || '').toLowerCase().replace(/[^a-z0-9]/g,'');
                        return mfrName === (mvr.manufacturer || '').toLowerCase().replace(/[^a-z0-9]/g,'') || mfrName.includes((mvr.manufacturer || '').toLowerCase().replace(/[^a-z0-9]/g,''));
                      });
                      if (mfrKey) {
                        const mfrFixtures = libData.manufacturers[mfrKey].fixtures || [];
                        const libFx = mfrFixtures.find(lf => {
                          const ln = (lf.name || '').toLowerCase().replace(/[^a-z0-9]/g,'');
                          const mn = (mvr.model || '').toLowerCase().replace(/[^a-z0-9]/g,'');
                          return ln.includes(mn) || mn.includes(ln);
                        });
                        if (libFx && libFx.modes && libFx.modes.length > 0) {
                          let bestMode = libFx.modes[0];
                          const mvrMode = (mvr.gdtfMode || '').toLowerCase();
                          for (const mode of libFx.modes) {
                            if (mode.name && mode.name.toLowerCase().includes(mvrMode)) { bestMode = mode; break; }

                  {"ASDFGHJKL".split("").map(k=><button key={k} onClick={()=>addChar(k)} style={{padding:"12px 0",fontSize:16,fontWeight:"bold",background:"#1a1e28",border:"1px solid #252930",color:"#ddd",borderRadius:6,cursor:"pointer",minHeight:44}}>{midiProfileKbCaps?k:k.toLowerCase()}</button>)}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"auto repeat(7,1fr) auto",gap:4}}>
                  <button onClick={()=>setMidiProfileKbCaps(!midiProfileKbCaps)} style={{padding:"12px 8px",fontSize:11,fontWeight:"bold",background:midiProfileKbCaps?kbColor+"22":"#1a1e28",border:"1px solid "+(midiProfileKbCaps?kbColor:"#252930"),color:midiProfileKbCaps?kbColor:"#888",borderRadius:8,cursor:"pointer",minHeight:44}}>CAPS</button>
                  {"ZXCVBNM".split("").map(k=><button key={k} onClick={()=>addChar(k)} style={{padding:"12px 0",fontSize:16,fontWeight:"bold",background:"#1a1e28",border:"1px solid #252930",color:"#ddd",borderRadius:6,cursor:"pointer",minHeight:44}}>{midiProfileKbCaps?k:k.toLowerCase()}</button>)}
                  <button onClick={()=>setMidiProfileKbValue(v=>v.slice(0,-1))} style={{padding:"12px 8px",fontSize:16,background:"#1a1e28",border:"1px solid #252930",color:"#888",borderRadius:8,cursor:"pointer",minHeight:44}}>⌫</button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"auto 1fr 1fr 1fr 3fr auto auto",gap:4}}>
                  <button onClick={()=>setMidiProfileKbValue("")} style={{padding:"12px 10px",fontSize:11,fontWeight:"bold",background:"#1c0a0a",border:"1px solid #ff333344",color:"#ff5544",borderRadius:8,cursor:"pointer",minHeight:44}}>CLR</button>
                  <button onClick={()=>setMidiProfileKbValue(v=>v+"-")} style={{padding:"12px 0",fontSize:16,fontWeight:"bold",background:"#1a1e28",border:"1px solid #252930",color:"#ddd",borderRadius:6,cursor:"pointer",minHeight:44}}>–</button>
                  <button onClick={()=>setMidiProfileKbValue(v=>v+"_")} style={{padding:"12px 0",fontSize:16,fontWeight:"bold",background:"#1a1e28",border:"1px solid #252930",color:"#ddd",borderRadius:6,cursor:"pointer",minHeight:44}}>_</button>
                  <button onClick={()=>setMidiProfileKbValue(v=>v+".")} style={{padding:"12px 0",fontSize:16,fontWeight:"bold",background:"#1a1e28",border:"1px solid #252930",color:"#ddd",borderRadius:6,cursor:"pointer",minHeight:44}}>.</button>
                  <button onClick={()=>setMidiProfileKbValue(v=>v+" ")} style={{padding:"12px 0",fontSize:13,background:"#1a1e28",border:"1px solid #252930",color:"#888",borderRadius:8,cursor:"pointer",minHeight:44}}>SPACE</button>
                  <button onClick={()=>setMidiProfileKbOpen(false)} style={{padding:"12px 10px",fontSize:11,fontWeight:"bold",background:"#1c0a0a",border:"1px solid #ff333344",color:"#ff5544",borderRadius:8,cursor:"pointer",minHeight:44}}>CANCEL</button>
                  <button onClick={saveFn} style={{padding:"12px 10px",fontSize:11,fontWeight:"bold",background:"#0a2a1a",border:"1px solid #44ffaa66",color:"#44ffaa",borderRadius:8,cursor:"pointer",minHeight:44}}>SAVE</button>
                </div>
              </div>;
            })()}
          </div>
        </div>
      )}

      {/* DMX Patch Modal */}
      {dmxPatchModalOpen && (
        <div onMouseDown={e=>e.stopPropagation()} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",zIndex:9998,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setDmxPatchModalOpen(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#0e1018",border:"1px solid #ff884444",borderRadius:8,width:700,maxHeight:"80vh",display:"flex",flexDirection:"column",boxShadow:"0 8px 40px rgba(0,0,0,0.8)"}}>
            <div style={{display:"flex",alignItems:"center",padding:"10px 16px",borderBottom:"1px solid #1e222a"}}>
              <span style={{fontSize:12,fontWeight:"bold",color:"#ff8844",letterSpacing:2}}>DMX PATCH</span>
              <div style={{marginLeft:"auto",display:"flex",gap:8}}>
                <button onClick={()=>setDmxPatch(generateDefaultPatch(fixtures))} style={{padding:"4px 12px",fontSize:9,background:"#0c0e12",border:"1px solid #252930",color:"#777",borderRadius:3,cursor:"pointer",letterSpacing:1}}>AUTO PATCH</button>
                <button onClick={()=>setDmxPatchModalOpen(false)} style={{padding:"4px 10px",fontSize:11,background:"none",border:"1px solid #333",color:"#666",borderRadius:3,cursor:"pointer"}}>✕</button>
              </div>
            </div>
            <div style={{display:"flex",padding:"6px 16px",gap:4,borderBottom:"1px solid #1a1d22",fontSize:8,color:"#555",letterSpacing:1}}>
              <span style={{width:20,textAlign:"center"}}>ON</span>
              <span style={{width:80}}>FIXTURE</span>
              <span style={{width:80}}>PARAMETER</span>
              <span style={{width:36,textAlign:"center"}}>UNI</span>
              <span style={{width:44,textAlign:"center"}}>CH</span>
              <span style={{width:28,textAlign:"center"}}>BITS</span>
              <span style={{width:50,textAlign:"right"}}>LIVE</span>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"4px 16px 12px"}}>
              {fixtures.map((fx,fxIdx) => {
                const p = dmxPatch[fx.id] || {universe:1,address:1,profile:fx.type,overrides:{}};
                const profile = DMX_PROFILES[p.profile] || DMX_PROFILES.SPOT;
                const params = Object.entries(profile.map);
                const fxUni = p.universe || 1;
                const fxAddr = p.address || 1;
                const fxConflict = dmxConflicts.has(String(fx.id));
                return [
                  <div key={`${fx.id}-addr`} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 0 2px",borderTop:fxIdx>0?"1px solid "+(fxConflict?"#ff333344":"#2a2e36"):"none",marginTop:fxIdx>0?6:0,background:fxConflict?"#1c0808":"#12151c",margin:"0 -4px",padding:"5px 4px 3px",borderRadius:3,border:fxConflict?"1px solid #ff333344":"1px solid transparent"}}>
                    <div style={{width:20}}>{fxConflict && <span style={{fontSize:10,color:"#ff3333"}}>{"\u26A0"}</span>}</div>
                    <div style={{width:80,display:"flex",alignItems:"center",gap:4}}>
                      <div style={{width:8,height:8,borderRadius:"50%",background:fxConflict?"#ff3333":fx.color,flexShrink:0}}/>
                      <span style={{fontSize:10,color:fxConflict?"#ff3333":fx.color,fontWeight:"bold",overflow:"hidden",whiteSpace:"nowrap"}}>{fx.name}</span>
                    </div>
                    <span style={{fontSize:9,color:fxConflict?"#ff333388":"#ff884488",letterSpacing:1,width:80}}>{fxConflict?"CONFLICT":"ADDRESS"}</span>
                    <div onClick={e=>{const r=e.currentTarget.getBoundingClientRect();setKeypadState({fxId:fx.id,paramId:null,field:'fixture_dmx',value:fxUni+'.'+fxAddr,rect:{top:r.bottom+2,left:r.left}});}} style={{width:80,background:fxConflict?"#1c0808":"#0c1018",border:"1px solid "+(fxConflict?"#ff3333":"#ff884466"),color:fxConflict?"#ff3333":"#ff8844",borderRadius:2,padding:"2px 4px",fontSize:12,textAlign:"center",cursor:"pointer",userSelect:"none",fontWeight:"bold"}}>{fxUni}.{fxAddr}</div>
                    <span style={{fontSize:8,color:fxConflict?"#ff333388":"#555"}}>{profile.channels}ch</span>
                    <span style={{fontSize:8,color:fxAddr+profile.channels-1>512?"#ff3333":"#333",marginLeft:2}}>{fxAddr+profile.channels-1>512?"OVERFLOW":""}</span>
                  </div>,
                  ...params.map(([paramId, profEntry], pIdx) => {
                  const ov = p.overrides?.[paramId] || { universe: fxUni, channel: fxAddr + profEntry.offset, bits: profEntry.bits };
                  const bypassed = !!ov.bypass;
                  const paramDef = getParam(paramId);
                  const liveKey = `${fx.id}-${paramId}`;
                  const liveVal = liveValues[liveKey];
                  const toggleBypass = () => { setDmxPatch(prev=>{const fp={...prev[fx.id]};const ovs={...(fp.overrides||{})};ovs[paramId]={...ov,bypass:!bypassed};return{...prev,[fx.id]:{...fp,overrides:ovs}};}); };
                  return (
                    <div key={`${fx.id}-${paramId}`} style={{display:"flex",alignItems:"center",gap:4,padding:"2px 0",opacity:bypassed?0.3:1}}>
                      <div style={{width:20,display:"flex",justifyContent:"center"}}>
                        <div onClick={toggleBypass} style={{width:12,height:12,borderRadius:2,border:"1px solid "+(bypassed?"#333":"#22cc55"),background:bypassed?"#0c0e12":"#22cc5522",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:bypassed?"#333":"#22cc55"}}>{bypassed?"":"✓"}</div>
                      </div>
                      <div style={{width:80}}/>
                      <span style={{width:80,fontSize:9,color:bypassed?"#333":(paramDef?.color||"#888"),textDecoration:bypassed?"line-through":"none"}}>{paramDef?.label||paramId}</span>
                      <div style={{width:36}}/>
                      <div onClick={e=>{if(bypassed)return;const r=e.currentTarget.getBoundingClientRect();setKeypadState({fxId:fx.id,paramId,field:'channel',value:String(ov.channel),rect:{top:r.bottom+2,left:r.left}});}} style={{width:44,background:"#080a0e",border:"1px solid "+(bypassed?"#111":(keypadState?.fxId===fx.id&&keypadState?.paramId===paramId&&keypadState?.field==='channel'?"#ff8844":"#1e222a")),color:bypassed?"#333":"#ff884488",borderRadius:2,padding:"2px 4px",fontSize:9,textAlign:"center",cursor:bypassed?"default":"pointer",userSelect:"none"}}>{ov.channel}</div>
                      <span style={{width:28,textAlign:"center",fontSize:8,color:bypassed?"#222":(ov.bits===16?"#4488ff":"#555")}}>{ov.bits}b</span>
                      <span style={{width:50,textAlign:"right",fontSize:9,color:bypassed?"#222":(liveVal!==undefined?"#22cc55":"#333"),fontFamily:"monospace"}}>{bypassed?"OFF":(liveVal!==undefined?`${Math.round(liveVal)}${paramDef?.unit||""}`:"—")}</span>
                    </div>
                  );
                })
                ];
              })}
            </div>
            {/* Numeric Keypad Popup */}
            {keypadState && (() => {
              const isDmx = keypadState.field === 'fixture_dmx';
              const isCh = keypadState.field === 'channel';
              const label = isDmx ? 'UNI . ADDRESS' : 'CHANNEL';
              const applyValue = (val) => {
                if (isDmx) {
                  const parts = val.split('.');
                  const newUni = Math.max(1, Math.min(64, parseInt(parts[0]) || 1));
                  const newAddr = parts.length > 1 ? Math.max(1, Math.min(512, parseInt(parts[1]) || 1)) : 1;
                  setDmxPatch(prev => {
                    const fp = {...prev[keypadState.fxId]};
                    const profDef = DMX_PROFILES[fp.profile||'SPOT'] || DMX_PROFILES.SPOT;
                    const ovs = {};
                    Object.entries(profDef.map).forEach(([paramId, {offset, bits}]) => {
                      const prev_ov = fp.overrides?.[paramId] || {};
                      ovs[paramId] = { ...prev_ov, universe: newUni, channel: newAddr + offset, bits };
                    });
                    return {...prev, [keypadState.fxId]: {...fp, universe: newUni, address: newAddr, overrides: ovs}};
                  });
                } else {
                  const v = Math.max(1, Math.min(512, parseInt(val) || 1));
                  setDmxPatch(prev => {
                    const fp = {...prev[keypadState.fxId]};
                    const ovs = {...(fp.overrides || {})};
                    const existing = ovs[keypadState.paramId] || {};
                    ovs[keypadState.paramId] = {...existing, channel: v};
                    return {...prev, [keypadState.fxId]: {...fp, overrides: ovs}};
                  });
                }
                setKeypadState(null);
              };
              const kpPress = (d) => setKeypadState(prev => prev.dirty ? ({...prev, value: prev.value + d}) : ({...prev, value: String(d), dirty: true}));
              const kpDot = () => setKeypadState(prev => {
                const v = prev.dirty ? prev.value : '';
                if (v.includes('.')) return prev;
                return {...prev, value: v + '.', dirty: true};
              });
              const kpClear = () => setKeypadState(prev => ({...prev, value: '', dirty: true}));
              const kpBack = () => setKeypadState(prev => ({...prev, value: prev.value.slice(0, -1)}));
              return (
                <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:10001}} onClick={()=>setKeypadState(null)}>
                  <div onClick={e=>e.stopPropagation()} style={{position:"fixed",top:Math.min(keypadState.rect.top, window.innerHeight-240),left:Math.min(keypadState.rect.left, window.innerWidth-160),width:150,background:"#141820",border:"1px solid #ff884466",borderRadius:6,boxShadow:"0 8px 30px rgba(0,0,0,0.9)",padding:8,display:"flex",flexDirection:"column",gap:4}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:2}}>
                      <span style={{fontSize:8,color:"#ff884488",letterSpacing:1}}>{label}</span>
                      {isCh && <span style={{fontSize:8,color:"#555"}}>1–512</span>}
                    </div>
                    <div style={{background:"#080a0e",border:"1px solid #ff884444",borderRadius:3,padding:"6px 8px",fontSize:16,color:keypadState.dirty?"#ff8844":"#ff884466",fontFamily:"monospace",textAlign:"right",minHeight:24,letterSpacing:2}}>{keypadState.value || '0'}</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:3}}>
                      {[1,2,3,4,5,6,7,8,9].map(d => (
                        <button key={d} onClick={()=>kpPress(String(d))} style={{padding:"8px 0",fontSize:14,fontWeight:"bold",background:"#1a1e28",border:"1px solid #252930",color:"#ddd",borderRadius:3,cursor:"pointer",fontFamily:"monospace"}}>{d}</button>
                      ))}
                      {isDmx ? <button onClick={kpDot} style={{padding:"8px 0",fontSize:16,fontWeight:"bold",background:"#1a1e28",border:"1px solid #ff884444",color:"#ff8844",borderRadius:3,cursor:"pointer",fontFamily:"monospace"}}>.</button>
                      : <button onClick={kpClear} style={{padding:"8px 0",fontSize:10,fontWeight:"bold",background:"#1c0a0a",border:"1px solid #ff333344",color:"#ff5544",borderRadius:3,cursor:"pointer",letterSpacing:1}}>CLR</button>}
                      <button onClick={()=>kpPress('0')} style={{padding:"8px 0",fontSize:14,fontWeight:"bold",background:"#1a1e28",border:"1px solid #252930",color:"#ddd",borderRadius:3,cursor:"pointer",fontFamily:"monospace"}}>0</button>
                      <button onClick={kpBack} style={{padding:"8px 0",fontSize:12,background:"#1a1e28",border:"1px solid #252930",color:"#888",borderRadius:3,cursor:"pointer"}}>&#9003;</button>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:isDmx?"1fr 1fr":"1fr",gap:3}}>
                      {isDmx && <button onClick={kpClear} style={{padding:"8px 0",fontSize:10,fontWeight:"bold",background:"#1c0a0a",border:"1px solid #ff333344",color:"#ff5544",borderRadius:3,cursor:"pointer",letterSpacing:1}}>CLR</button>}
                      <button onClick={()=>{if(keypadState.dirty){applyValue(keypadState.value);}else{setKeypadState(null);}}} style={{padding:"8px 0",fontSize:11,fontWeight:"bold",background:"#0a1a0a",border:"1px solid #44ffaa44",color:"#44ffaa",borderRadius:3,cursor:"pointer",letterSpacing:2}}>ENTER</button>
                    </div>
                  </div>
                </div>
              );
            })()}
          </div>
        </div>
      )}

      {/* DMX Monitor Modal */}
      {dmxMonitorOpen && (()=>{
        const isTestActive = monitorTestRamp || monitorTestChannel !== null;
        const handleClose = () => {
          if(isTestActive){
            setMonitorCloseConfirm(true);
            return;
          }
          setDmxMonitorOpen(false);
        };
        return <div onMouseDown={e=>e.stopPropagation()} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={handleClose}>
          <div onClick={e=>e.stopPropagation()} style={{position:"relative",width:"90vw",height:"85vh",maxWidth:1200,display:"flex",flexDirection:"column",background:"#0a0c14",border:"1px solid "+(isTestActive?"#ff880066":"#1e2a44"),borderRadius:8,overflow:"hidden",boxShadow:"0 8px 40px rgba(0,0,0,0.9)"}}>
            {/* Header */}
            <div style={{display:"flex",alignItems:"center",padding:"10px 16px",borderBottom:"1px solid #1e2a44",gap:10,flexShrink:0}}>
              <span style={{fontSize:12,fontWeight:"bold",color:"#4488ff",letterSpacing:2}}>{"\u25A3"} DMX MONITOR</span>
              {/* Universe selector: arrows + display + keypad */}
              <div style={{display:"flex",alignItems:"center",gap:4,marginLeft:8}}>
                <button onClick={()=>setMonitorUniverse(u=>Math.max(1,u-1))} style={{width:36,height:36,fontSize:16,fontWeight:"bold",background:"#0c0e12",border:"1px solid #4488ff44",color:"#4488ff",borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>◀</button>
                <div onClick={e=>{const r=e.currentTarget.getBoundingClientRect();setKeypadState({field:'dmx_universe',value:String(monitorUniverse),dirty:false,rect:{top:r.bottom+2,left:r.left}});}} style={{width:64,height:36,background:"#080a0e",border:"2px solid #4488ff66",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                  <span style={{fontSize:16,fontWeight:"bold",color:"#44ff88",fontFamily:"monospace"}}>{monitorUniverse}</span>
                </div>
                <button onClick={()=>setMonitorUniverse(u=>Math.min(64,u+1))} style={{width:36,height:36,fontSize:16,fontWeight:"bold",background:"#0c0e12",border:"1px solid #4488ff44",color:"#4488ff",borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>▶</button>
                <span style={{fontSize:8,color:"#555",marginLeft:4}}>UNI</span>
              </div>
              <button onClick={()=>{setMonitorTestChannel(null);setMonitorTestRamp(p=>!p);}} style={{padding:"6px 12px",fontSize:10,fontWeight:"bold",background:monitorTestRamp?"#442200":"#0c0e12",border:"2px solid "+(monitorTestRamp?"#ff8800":"#ff880044"),color:monitorTestRamp?"#ff8800":"#ff880066",borderRadius:8,cursor:"pointer",letterSpacing:1,minHeight:36,marginLeft:6}}>{monitorTestRamp?"■ STOP RAMP":"▶ TEST RAMP"}</button>
              <div style={{flex:1}}/>
              <div style={{display:"flex",alignItems:"center",gap:6,minWidth:180,justifyContent:"flex-end"}}>
                <div style={{display:"flex",alignItems:"center",gap:3}}>
                  <div style={{width:8,height:8,borderRadius:2,background:"#4488ff55"}}/>
                  <span style={{fontSize:8,color:"#4488ff88"}}>INPUT</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:3}}>
                  <div style={{width:8,height:8,borderRadius:2,background:"#44cc4455"}}/>
                  <span style={{fontSize:8,color:"#44cc4488"}}>LUMINA</span>
                </div>
                {monitorTestChannel!==null?<span style={{fontSize:9,color:"#ff8800",fontWeight:"bold",background:"#ff880018",padding:"2px 6px",borderRadius:3,border:"1px solid #ff880044"}}>TEST CH {monitorTestChannel+1}</span>:null}
                {monitorTestRamp?<span style={{fontSize:9,color:"#ff8800",fontWeight:"bold",background:"#ff880018",padding:"2px 6px",borderRadius:3,border:"1px solid #ff880044",animation:"pulse 1s infinite"}}>RAMPING</span>:null}
              </div>
              <button onClick={()=>setOutputConfig(c=>({...c,enabled:!c.enabled}))} style={{padding:"6px 12px",fontSize:10,fontWeight:"bold",background:outputConfig.enabled?"#0a2a1a":"#1a0808",border:"2px solid "+(outputConfig.enabled?"#22cc55":"#ff4444"),color:outputConfig.enabled?"#22cc55":"#ff4444",borderRadius:8,cursor:"pointer",letterSpacing:1,minHeight:36,flexShrink:0,animation:outputConfig.enabled?"none":"pulse 1.5s ease-in-out infinite"}}>{outputConfig.enabled?"OUTPUT ON":"OUTPUT OFF"}</button>
              <button onClick={handleClose} style={{width:36,height:36,fontSize:14,background:isTestActive?"#1a0a00":"none",border:"1px solid "+(isTestActive?"#ff8800":"#333"),color:isTestActive?"#ff8800":"#666",borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{"\u2715"}</button>
            </div>
            {/* Channel grid */}
            <div style={{flex:1,overflow:"hidden",padding:4}}>
              {(()=>{
                const md=monitorDataRef.current[monitorUniverse];
                const inp=md?md.input:new Array(512).fill(0);
                const out=md?md.output:new Array(512).fill(0);
                const ovSet=md?new Set(md.overrides):new Set();
                const COLS=16;
                const ROWS=32;
                return <div style={{display:"grid",gridTemplateColumns:`repeat(${COLS},1fr)`,gridTemplateRows:`repeat(${ROWS},1fr)`,gap:1,fontFamily:"monospace",fontSize:10,height:"100%"}}>
                  {Array.from({length:512},(_,i)=>{
                    const isOverride=ovSet.has(i);
                    const val=out[i]||0;
                    const inVal=inp[i]||0;
                    const brightness=Math.max(0.05,val/255);
                    const bgColor=isOverride
                      ?`rgba(68,204,68,${brightness*0.4})`
                      :val>0?`rgba(68,136,255,${brightness*0.35})`
                      :"rgba(255,255,255,0.02)";
                    const borderColor=isOverride
                      ?`rgba(68,204,68,${Math.max(0.15,brightness*0.5)})`
                      :val>0?`rgba(68,136,255,${Math.max(0.1,brightness*0.3)})`
                      :"rgba(255,255,255,0.05)";
                    const isTesting=monitorTestChannel===i;
                    return <div key={i} onClick={()=>{setMonitorTestRamp(false);setMonitorTestChannel(prev=>prev===i?null:i);}} style={{background:isTesting?"rgba(255,136,0,0.35)":bgColor,border:`1px solid ${isTesting?"#ff8800":borderColor}`,borderRadius:2,textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",boxShadow:isTesting?"0 0 6px #ff880066":"none",transition:"background 0.15s",overflow:"hidden"}} title={`${monitorUniverse}.${i+1} | IN: ${inVal} | OUT: ${val}${isOverride?" (LUMINA)":""}${isTesting?" [TESTING]":""}\nClick to test`}>
                      <div style={{fontSize:7,color:isTesting?"#ff8800":"#666",lineHeight:1}}>{i+1}</div>
                      <div style={{fontSize:11,fontWeight:(val>0||isTesting)?"bold":"normal",color:isTesting?"#ff8800":isOverride?(val>0?"#44cc44":"#1a3a1a"):val>0?"#4488ff":"#1a1a22",lineHeight:1.2}}>{isTesting?255:val}</div>
                    </div>;
                  })}
                </div>;
              })()}
            </div>
            {/* Output OFF warning */}
            {!outputConfig.enabled&&<div style={{position:"absolute",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:5,borderRadius:8,pointerEvents:"none"}}>
              <div style={{fontSize:48,fontWeight:"bold",color:"#ff2222",letterSpacing:8,fontFamily:"monospace",animation:"outputoff 1.5s ease-in-out infinite",textTransform:"uppercase",padding:"20px 40px",border:"3px solid #ff222266",borderRadius:12,background:"rgba(40,0,0,0.7)"}}>OUTPUT OFF</div>
            </div>}
            {/* Close confirm popup */}
            {monitorCloseConfirm && <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:10,borderRadius:8}}>
              <div style={{background:"#141820",border:"2px solid #ff880066",borderRadius:10,padding:"20px 28px",display:"flex",flexDirection:"column",gap:12,minWidth:320,maxWidth:400,boxShadow:"0 8px 30px rgba(0,0,0,0.9)"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:18,color:"#ff8800"}}>⚠</span>
                  <span style={{fontSize:13,fontWeight:"bold",color:"#ff8800",letterSpacing:1}}>TEST ACTIVE</span>
                </div>
                <div style={{fontSize:12,color:"#c0c6d0",lineHeight:1.6}}>
                  {monitorTestRamp ? "RAMP TEST is running on Universe "+monitorUniverse : "Channel "+(monitorTestChannel!==null?monitorTestChannel+1:"?")+" is at FULL on Universe "+monitorUniverse}
                </div>
                <div style={{fontSize:11,color:"#888",lineHeight:1.5}}>Closing will release all test output and restore the universe.</div>
                <div style={{display:"flex",gap:8,marginTop:4}}>
                  <button onClick={()=>setMonitorCloseConfirm(false)} style={{flex:1,padding:"10px 0",fontSize:12,fontWeight:"bold",background:"#0c0e12",border:"2px solid #4488ff44",color:"#4488ff",borderRadius:6,cursor:"pointer",letterSpacing:1,minHeight:42}}>BACK</button>
                  <button onClick={()=>{setMonitorCloseConfirm(false);setMonitorTestRamp(false);setMonitorTestChannel(null);setDmxMonitorOpen(false);}} style={{flex:1,padding:"10px 0",fontSize:12,fontWeight:"bold",background:"#1a0a00",border:"2px solid #ff8800",color:"#ff8800",borderRadius:6,cursor:"pointer",letterSpacing:1,minHeight:42}}>OK</button>
                </div>
              </div>
            </div>}
          </div>
        </div>;
      })()}

      <div style={{height:22,background:"#1a1814",borderTop:"1px solid #3a3020",display:"flex",alignItems:"center",padding:"0 14px",gap:20,flexShrink:0}}>
        {[{label:"FIX",val:fixtures.length},{label:"TOOL",val:tool.toUpperCase()},{label:"CUES",val:cues.length},{label:"LOOP",val:loopEnabled?`${loopStart}-${loopEnd} beats`:"OFF"},{label:"BPM",val:bpm},{label:"AUDIO",val:audioMode==='none'?'OFF':audioMode==='file'?(audioFileName||'FILE'):'MIC'},{label:"OUTPUT",val:outputConfig.enabled?(outputConnected?"LIVE":"DISC"):"OFF"},{label:"INPUT",val:outputConfig.inputEnabled?"ON":"OFF"}].map(item=>(
          <span key={item.label} style={{fontSize:8,color:"#444"}}>
            <span style={{color:"#252930",marginRight:4}}>{item.label}</span>
            <span style={{color:"#666"}}>{item.val}</span>
          </span>
        ))}
        <div style={{flex:1}}/>
        <span style={{fontSize:8,color:"#1e222a"}}>LUMINA FX v0.6-perf</span>
      </div>
      {curveEditorCue && (() => { const ce = cues.find(c => c.id === curveEditorCue); const cp = ce ? getParam(ce.param) : null; return ce && cp ? <CurveEditor cue={ce} param={cp} setCues={setCues} onClose={() => setCurveEditorCue(null)}/> : null; })()}
      {dragOverlapPopup && <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:10006,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.7)",animation:"backdropIn 0.2s ease-out"}} onClick={()=>{
        const pre=dragOverlapPopup.preBeats;
        setCues(prev=>prev.map(c=>pre[c.id]!=null?{...c,beat:pre[c.id]}:c));
        setDragOverlapPopup(null);
      }}>
        <div onClick={e=>e.stopPropagation()} style={{background:"#0e1018",border:"1px solid #e8aa2244",borderRadius:8,padding:16,width:340,boxShadow:"0 8px 40px rgba(0,0,0,0.8)",animation:"popIn 0.2s ease-out"}}>
          <div style={{fontSize:12,fontWeight:"bold",color:"#e8aa22",marginBottom:8,letterSpacing:2,textAlign:"center"}}>{"\u26A0"} OVERWRITE CUES</div>
          <div style={{fontSize:10,color:"#888",marginBottom:4,textAlign:"center"}}>{dragOverlapPopup.overlaps.length} cue{dragOverlapPopup.overlaps.length>1?"s":""} will be affected</div>
          <div style={{fontSize:9,color:"#666",marginBottom:12,textAlign:"center"}}>{dragOverlapPopup.overlaps.filter(o=>o.type==="full").length} fully covered &middot; {dragOverlapPopup.overlaps.filter(o=>o.type==="partial").length} partially covered (will split)</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            <button onClick={()=>{
              const pop=dragOverlapPopup;
              const movedIds=new Set(pop.movedIds);
              setCues(prev=>{
                const movedCues=prev.filter(c=>movedIds.has(c.id));
                let result=prev.filter(c=>!pop.overlaps.find(o=>o.cue.id===c.id));
                pop.overlaps.forEach(({cue:oc, type})=>{
                  if(type==="full") return;
                  const oL=oc.beat, oR=oc.beat+oc.duration;
                  const cuts=[];
                  movedCues.forEach(mc=>{
                    const mL=mc.beat, mR=mc.beat+mc.duration;
                    if(mc.fixtureId===oc.fixtureId && mc.param===oc.param && mR>oL && mL<oR) cuts.push({mL,mR});
                  });
                  cuts.sort((a,b)=>a.mL-b.mL);
                  let cursor=oL;
                  cuts.forEach(({mL,mR})=>{
                    if(mL>cursor && (mL-cursor)>0.05){
                      const sv=interpolateCue(oc,cursor), ev=interpolateCue(oc,mL);
                      result.push({...oc, id:genId(), beat:cursor, duration:mL-cursor, startValue:sv, value:sv, endValue:ev, fadeIn:oc.fadeIn, fadeOut:oc.fadeOut});
                    }
                    cursor=Math.max(cursor,mR);
                  });
                  if(cursor<oR && (oR-cursor)>0.05){
                    const sv=interpolateCue(oc,cursor), ev=interpolateCue(oc,oR);
                    result.push({...oc, id:genId(), beat:cursor, duration:oR-cursor, startValue:sv, value:ev, endValue:ev, fadeIn:oc.fadeIn, fadeOut:oc.fadeOut});
                  }
                });
                return result;
              });
              setDragOverlapPopup(null);
            }} style={{padding:"8px 0",background:"#ff444422",border:"1px solid #ff4444",color:"#ff6644",borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:"bold",letterSpacing:1}}>OVERWRITE<div style={{fontSize:8,color:"#ff664488",marginTop:2}}>Split partial, remove fully covered</div></button>
            <button onClick={()=>{
              const pre=dragOverlapPopup.preBeats;
              setCues(prev=>prev.map(c=>pre[c.id]!=null?{...c,beat:pre[c.id]}:c));
              setDragOverlapPopup(null);
            }} style={{padding:"6px 0",background:"#1a1e26",border:"1px solid #333",color:"#666",borderRadius:8,cursor:"pointer",fontSize:10,letterSpacing:1}}>CANCEL</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

// Defer render to let the browser paint the splash screen first
// This prevents the "Page Unresponsive" dialog during heavy init
setTimeout(() => {
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<LightingTimeline />);
}, 0);
  </script>
</body>
</html>
