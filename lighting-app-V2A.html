  <script type="text/babel">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

if(!window.__midiSliders)window.__midiSliders={};
if(!window.__midiLearnState)window.__midiLearnState={learn:null,map:{},setLearn:null,setMap:null};
if(!window.__lmeState)window.__lmeState={configRef:null,assignedRef:null,setOverride:null,learnMode:false};
function GlowSlider({min=0,max=100,step=1,value,onChange,color="#e8aa22",style={},ticks=10,label="",midiId=""}){
  const trackRef=useRef(null);
  const mls=window.__midiLearnState;
  const reverseMidi=midiId?Object.entries(mls.map).find(([k,v])=>v==="slider:"+midiId):null;
  const isMidiLearning=mls.learn===("slider:"+midiId);
  const onChangeRef=useRef(onChange);onChangeRef.current=onChange;
  const minRef=useRef(min);minRef.current=min;const maxRef=useRef(max);maxRef.current=max;const stepRef=useRef(step);stepRef.current=step;
  useEffect(()=>{if(!midiId)return;window.__midiSliders["slider:"+midiId]={abs:(pct)=>{const v=minRef.current+pct*(maxRef.current-minRef.current);const r=Math.round(Math.max(minRef.current,Math.min(maxRef.current,v))/stepRef.current)*stepRef.current;onChangeRef.current(Math.round(r*1000)/1000);},rel:(delta)=>{const range=maxRef.current-minRef.current;const inc=delta*(range/64);const cur=minRef.current+((value-minRef.current));const v=cur+inc;const r=Math.round(Math.max(minRef.current,Math.min(maxRef.current,v))/stepRef.current)*stepRef.current;onChangeRef.current(Math.round(r*1000)/1000);}};return()=>{delete window.__midiSliders["slider:"+midiId];};},[midiId,value]);
  const handleMidiClick=()=>{const live=window.__midiLearnState;if(midiId&&live.setLearn&&live.learn==="waiting"){const rev=Object.entries(live.map).find(([k,v])=>v==="slider:"+midiId);if(rev){live.setMap(prev=>{const next={...prev};delete next[rev[0]];return next;});live.learn=null;live.setLearn(null);}else{live.learn="slider:"+midiId;live.setLearn("slider:"+midiId);}return true;}return false;};
  const zoomRef=useRef(null);
  const [zoomed,setZoomed]=useState(false);
  const longPressRef=useRef(null);
  const activeRef=useRef(false);
  const pct=Math.max(0,Math.min(100,((value-min)/(max-min))*100));
  const clamp=(v)=>{const r=Math.round(Math.max(min,Math.min(max,v))/step)*step;return Math.round(r*1000)/1000;};
  const update=(e)=>{const el=(zoomed&&zoomRef.current)?zoomRef.current:trackRef.current;if(!el)return;const r=el.getBoundingClientRect();const x=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));onChange(clamp(min+x*(max-min)));};
  const startLongPress=()=>{longPressRef.current=setTimeout(()=>{if(activeRef.current)setZoomed(true);},400);};
  const cancelLongPress=()=>{if(longPressRef.current){clearTimeout(longPressRef.current);longPressRef.current=null;}};
  const onDown=(e)=>{e.preventDefault();if(handleMidiClick())return;activeRef.current=true;startLongPress();update(e);
    const mv=(ev)=>{cancelLongPress();update(ev);};const up=()=>{cancelLongPress();activeRef.current=false;setZoomed(false);window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",up);};
    window.addEventListener("mousemove",mv);window.addEventListener("mouseup",up);};
  const onTouch=(e)=>{e.preventDefault();activeRef.current=true;const t=e.touches[0];startLongPress();update(t);
    const mv=(ev)=>{ev.preventDefault();cancelLongPress();update(ev.touches[0]);};const up=()=>{cancelLongPress();activeRef.current=false;setZoomed(false);trackRef.current?.removeEventListener("touchmove",mv);trackRef.current?.removeEventListener("touchend",up);};
    trackRef.current.addEventListener("touchmove",mv,{passive:false});trackRef.current.addEventListener("touchend",up);};
  const renderScale=(tk,h)=>{const marks=[];for(let i=0;i<=tk;i++){const p=(i/tk)*100;const maj=i===0||i===tk||i===Math.round(tk/2);marks.push({pct:p,major:maj});}
    return <><div style={{position:"absolute",left:0,right:0,top:h,height:1,background:"#3a3f4c"}}/>
      {marks.map((m,i)=><div key={i} style={{position:"absolute",left:`${m.pct}%`,top:m.major?h-8:h-4,width:1,height:m.major?8:4,background:m.major?"#666":"#333"}}/>)}
      <div style={{position:"absolute",left:`${pct}%`,top:0,transform:"translateX(-50%)",display:"flex",flexDirection:"column",alignItems:"center",pointerEvents:"none"}}>
        <div style={{width:0,height:0,borderLeft:"7px solid transparent",borderRight:"7px solid transparent",borderTop:`12px solid ${color}`,filter:`drop-shadow(0 0 4px ${color}88)`}}/>
        <div style={{width:2,height:Math.max(2,h-13),background:color,marginTop:-1,boxShadow:`0 0 4px ${color}66`}}/>
      </div></>};
  return <><div ref={trackRef} onMouseDown={onDown} onTouchStart={onTouch} style={{position:"relative",height:32,cursor:"pointer",touchAction:"none",border:isMidiLearning?"2px solid #cc66ff":"none",borderRadius:isMidiLearning?4:0,animation:isMidiLearning?"midilearn 0.8s infinite":"none",...style}}>
    {label&&<div style={{position:"absolute",left:0,right:0,top:0,bottom:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:"bold",letterSpacing:6,color:"#ffffff",opacity:0.2,pointerEvents:"none",userSelect:"none",textTransform:"uppercase",zIndex:0}}>{label}</div>}
    {isMidiLearning&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",zIndex:5,pointerEvents:"none"}}><span style={{fontSize:8,color:"#cc66ff",fontWeight:"bold",background:"#1a0a2a99",padding:"1px 4px",borderRadius:2}}>MOVE FADER</span></div>}
    {reverseMidi&&!isMidiLearning&&<div style={{position:"absolute",top:2,right:4,fontSize:7,color:"#bb88ee",background:"#1a0a2a",border:"1px solid #7733aa",borderRadius:2,padding:"0 2px",zIndex:4,pointerEvents:"none"}}>{reverseMidi[0].replace("cc:","CC")}</div>}
    {renderScale(ticks,20)}
  </div>
  {zoomed&&(()=>{const r=trackRef.current?.getBoundingClientRect();if(!r)return null;
    const W=Math.min(window.innerWidth-16,r.width*3);
    const L=Math.max(8,Math.min(r.left-(W-r.width)/2,window.innerWidth-W-8));
    return <div ref={zoomRef} onMouseDown={e=>{e.preventDefault();e.stopPropagation();const el=zoomRef.current;const rect=el.getBoundingClientRect();const x=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));onChange(clamp(min+x*(max-min)));
      const mv2=(ev)=>{const rect2=el.getBoundingClientRect();const x2=Math.max(0,Math.min(1,(ev.clientX-rect2.left)/rect2.width));onChange(clamp(min+x2*(max-min)));};
      const up2=()=>{setZoomed(false);activeRef.current=false;window.removeEventListener("mousemove",mv2);window.removeEventListener("mouseup",up2);};
      window.addEventListener("mousemove",mv2);window.addEventListener("mouseup",up2);
    }} onTouchStart={e=>{e.preventDefault();e.stopPropagation();const el=zoomRef.current;const t=e.touches[0];const rect=el.getBoundingClientRect();const x=Math.max(0,Math.min(1,(t.clientX-rect.left)/rect.width));onChange(clamp(min+x*(max-min)));
      const mv2=(ev)=>{ev.preventDefault();const t2=ev.touches[0];const rect2=el.getBoundingClientRect();const x2=Math.max(0,Math.min(1,(t2.clientX-rect2.left)/rect2.width));onChange(clamp(min+x2*(max-min)));};
      const up2=()=>{setZoomed(false);activeRef.current=false;el.removeEventListener("touchmove",mv2);el.removeEventListener("touchend",up2);};

      <div style={{position:"relative",width:"100%",height:"100%"}}>
        {renderScale(ticks*3,32)}

    </div>;
  })()}</>;
}

const EASINGS = {

function generateDefaultPatch(fixtures) {
  const patch = {};
  let uni = 1, addr = 1;
  fixtures.forEach(fx => {
    const profile = DMX_PROFILES[fx.type] || DMX_PROFILES.SPOT;
    // Advance to next universe if fixture won't fit in current one
    if (addr + profile.channels - 1 > 512) { uni++; addr = 1; }
    if (uni > 64) return; // Max 64 universes
    const overrides = {};
    Object.entries(profile.map).forEach(([paramId, {offset, bits}]) => {
      overrides[paramId] = { universe:uni, channel: addr + offset, bits };
    });
    patch[fx.id] = { universe:uni, address:addr, profile:fx.type, overrides };
    addr += profile.channels;
  });
  return patch;
}

function scaleParam(paramId, logicalValue, bits) {
  const p = getParam(paramId);
  if (!p) return 0;
  const norm = Math.max(0, Math.min(1, (logicalValue - p.min) / Math.max(1, p.max - p.min)));
  return bits === 16 ? Math.round(norm * 65535) : Math.round(norm * 255);
}

function buildDMXFrames(liveValues, dmxPatch) {
  const universes = {};
  for (const [key, val] of Object.entries(liveValues)) {
    const idx = key.indexOf("-");
    const fxId = parseInt(key.substring(0, idx));
    const paramId = key.substring(idx + 1);
    const patch = dmxPatch[fxId];
    if (!patch) continue;
    const profile = DMX_PROFILES[patch.profile];
    if (!profile || !profile.map[paramId]) continue;
    let uni, addr, bits;
    if (patch.overrides && patch.overrides[paramId]) {
      const ov = patch.overrides[paramId];
      if (ov.bypass) continue;
      uni = ov.universe || patch.universe;
      addr = ov.channel;
      bits = ov.bits || profile.map[paramId].bits;
    } else {
      uni = patch.universe;
      addr = patch.address + profile.map[paramId].offset;
      bits = profile.map[paramId].bits;
    }
    if (addr < 1 || addr > 512) continue;
    if (!universes[uni]) universes[uni] = new Array(512).fill(0);
    const frame = universes[uni];
    const scaled = scaleParam(paramId, val, bits);
    if (bits === 16 && addr < 512) {
      frame[addr - 1] = (scaled >> 8) & 0xFF;
      frame[addr] = scaled & 0xFF;
    } else {
      frame[addr - 1] = scaled & 0xFF;
    }
  }
  return universes;
}

// Sparse override format: only channels with active cue values
// Returns { "uni": { "ch_index": value, ... }, ... }
function buildDMXOverrides(liveValues, dmxPatch) {
  const overrides = {};
  for (const [key, val] of Object.entries(liveValues)) {
    const idx = key.indexOf("-");
    const fxId = parseInt(key.substring(0, idx));
    const paramId = key.substring(idx + 1);
    const patch = dmxPatch[fxId];
    if (!patch) continue;
    const profile = DMX_PROFILES[patch.profile];
    if (!profile || !profile.map[paramId]) continue;
    let uni, addr, bits;
    if (patch.overrides && patch.overrides[paramId]) {
      const ov = patch.overrides[paramId];
      if (ov.bypass) continue;
      uni = ov.universe || patch.universe;
      addr = ov.channel;
      bits = ov.bits || profile.map[paramId].bits;
    } else {
      uni = patch.universe;
      addr = patch.address + profile.map[paramId].offset;
      bits = profile.map[paramId].bits;
    }
    if (addr < 1 || addr > 512) continue;
    if (!overrides[uni]) overrides[uni] = {};
    const scaled = scaleParam(paramId, val, bits);
    if (bits === 16 && addr < 512) {
      overrides[uni][addr - 1] = (scaled >> 8) & 0xFF;
      overrides[uni][addr] = scaled & 0xFF;
    } else {
      overrides[uni][addr - 1] = scaled & 0xFF;
    }
  }
  return overrides;
}

function interpolateCue(cue, beat) {
  const t = Math.max(0, Math.min(1, (beat - cue.beat) / cue.duration));
  if (cue.autoPoints && cue.autoPoints.length > 0) {
    const relTime = beat - cue.beat;
    const pts = cue.autoPoints;
    if (relTime <= pts[0].t) return pts[0].v;
    if (relTime >= pts[pts.length-1].t) return pts[pts.length-1].v;
    for (let i = 0; i < pts.length-1; i++) {
      if (relTime >= pts[i].t && relTime <= pts[i+1].t) {
        const frac = (relTime - pts[i].t) / (pts[i+1].t - pts[i].t);
        return pts[i].v + frac * (pts[i+1].v - pts[i].v);
      }
    }
    return pts[pts.length-1].v;
  }
  const easeFn = EASINGS[cue.easing || "linear"].fn;
  const fadeIn = cue.fadeIn || 0, fadeOut = cue.fadeOut || 0;
  const param = getParam(cue.param);
  const startVal = cue.startValue !== undefined ? cue.startValue : param.min;
  const endVal = cue.endValue !== undefined ? cue.endValue : cue.value;
  if (fadeIn > 0 && t < fadeIn) return startVal + easeFn(t/fadeIn) * (cue.value - startVal);
  if (fadeOut > 0 && t > (1-fadeOut)) return cue.value + easeFn((t-(1-fadeOut))/fadeOut) * (endVal - cue.value);
  return cue.value;
}

function buildCurvePath(cue, w, h) {
  const param = getParam(cue.param);
  const range = param.max - param.min;
  if (cue.autoPoints && cue.autoPoints.length > 0) {
    const pts = cue.autoPoints.map(p => {
      const x = cue.duration > 0 ? (p.t / cue.duration) * w : 0;
      const norm = range > 0 ? (p.v - param.min) / range : 0.5;
      return `${x.toFixed(1)},${(h - norm * h).toFixed(1)}`;
    });
    return `M ${pts.join(" L ")}`;
  }
  const steps = Math.max(4, Math.floor(w/4));
  const easeFn = EASINGS[cue.easing || "linear"].fn;
  const fadeIn = cue.fadeIn||0, fadeOut = cue.fadeOut||0;
  const startVal = cue.startValue !== undefined ? cue.startValue : param.min;
  const endVal = cue.endValue !== undefined ? cue.endValue : param.min;
  const pts = Array.from({length:steps+1}, (_,i) => {
    const t = i/steps;
    let val;
    if (fadeIn>0 && t<fadeIn) val = startVal + easeFn(t/fadeIn)*(cue.value-startVal);
    else if (fadeOut>0 && t>1-fadeOut) val = cue.value + easeFn((t-(1-fadeOut))/fadeOut)*(endVal-cue.value);
    else val = cue.value;
    const norm = range>0 ? (val-param.min)/range : 0.5;
    return `${(t*w).toFixed(1)},${(h-norm*h).toFixed(1)}`;
  });
  return `M ${pts.join(" L ")}`;
}

// ─── Full-Screen Curve Editor ───
function CurveEditor({ cue, param, setCues, onClose }) {

  // Scale normalized points to current cue
  const denormalizePoints = (pts) => pts.map(p => ({ t: p.t * dur, v: param.min + p.v * range, curve: p.curve || "linear" }));

    const name = prompt("Preset name:");

  return (
    <div style={{position:"fixed",top:60,left:220,right:16,bottom:280,zIndex:10010,display:"flex",flexDirection:"column",background:"rgba(8,12,20,0.35)",backdropFilter:"blur(8px) saturate(1.1)",WebkitBackdropFilter:"blur(8px) saturate(1.1)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:14,boxShadow:"0 12px 48px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.06)",overflow:"hidden"}} onClick={e=>e.stopPropagation()}>

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:10,fontWeight:"bold",color:param.color,letterSpacing:2}}>CURVE EDITOR</span>
          <span style={{fontSize:9,color:"#556"}}>{param.label.toUpperCase()} &middot; {cue.duration.toFixed(2)}b</span>

        <div style={{display:"flex",gap:5,alignItems:"center"}}>
          {SEGMENT_CURVES.map(c => (
            <button key={c} onClick={()=>setActiveCurve(c)} style={{minWidth:44,minHeight:44,padding:"6px 0",fontSize:14,fontWeight:"bold",background:activeCurve===c?param.color+"22":"#1a1e28",border:"1px solid "+(activeCurve===c?param.color:"#252930"),color:activeCurve===c?param.color:"#666",borderRadius:8,cursor:"pointer",fontFamily:"monospace",touchAction:"manipulation",display:"flex",alignItems:"center",justifyContent:"center"}}>{SEGMENT_LABELS[c]}</button>
          ))}
          <button onClick={()=>setPoints(prev=>{const s=[...prev].sort((a,b)=>a.t-b.t);return s.map(p=>({...p,curve:activeCurve}));})} style={{minWidth:44,minHeight:44,padding:"6px 0",fontSize:10,fontWeight:"bold",background:"#1a1e28",border:"1px solid #252930",color:"#666",borderRadius:8,cursor:"pointer",fontFamily:"monospace",touchAction:"manipulation",display:"flex",alignItems:"center",justifyContent:"center"}}>ALL</button>
          <div style={{width:1,height:32,background:"rgba(255,255,255,0.08)",margin:"0 4px"}}/>
          <button onClick={()=>setPresetMenu(v=>!v)} style={{minWidth:50,minHeight:44,padding:"6px 8px",background:presetMenu?"rgba(204,136,255,0.15)":"#1a1e28",border:"1px solid "+(presetMenu?"#cc88ff":"#252930"),color:presetMenu?"#cc88ff":"#666",cursor:"pointer",fontSize:10,borderRadius:8,fontFamily:"monospace",fontWeight:"bold",touchAction:"manipulation",position:"relative"}}>{"\u2630"}</button>
          <button onClick={savePreset} style={{minWidth:50,minHeight:44,padding:"6px 6px",background:"rgba(204,136,255,0.08)",border:"1px solid rgba(204,136,255,0.3)",color:"#cc88ff",cursor:"pointer",fontSize:9,borderRadius:8,fontFamily:"monospace",fontWeight:"bold",letterSpacing:1,touchAction:"manipulation"}}>PRE</button>
          <button onClick={exportCurve} style={{minWidth:44,minHeight:44,padding:"6px 6px",background:"rgba(68,170,255,0.08)",border:"1px solid rgba(68,170,255,0.3)",color:"#44aaff",cursor:"pointer",fontSize:9,borderRadius:8,fontFamily:"monospace",fontWeight:"bold",letterSpacing:1,touchAction:"manipulation"}}>EXP</button>
          <button onClick={importCurve} style={{minWidth:44,minHeight:44,padding:"6px 6px",background:"rgba(255,170,68,0.08)",border:"1px solid rgba(255,170,68,0.3)",color:"#ffaa44",cursor:"pointer",fontSize:9,borderRadius:8,fontFamily:"monospace",fontWeight:"bold",letterSpacing:1,touchAction:"manipulation"}}>IMP</button>
          <div style={{width:1,height:32,background:"rgba(255,255,255,0.08)",margin:"0 4px"}}/>
          <button onClick={handleClear} style={{minWidth:50,minHeight:44,padding:"6px 8px",background:"rgba(255,68,68,0.08)",border:"1px solid rgba(255,68,68,0.3)",color:"#ff6666",cursor:"pointer",fontSize:11,borderRadius:8,fontFamily:"monospace",fontWeight:"bold",letterSpacing:1,touchAction:"manipulation"}}>CLR</button>
          <button onClick={handleSave} style={{minWidth:50,minHeight:44,padding:"6px 8px",background:"rgba(68,255,102,0.08)",border:"1px solid rgba(68,255,102,0.3)",color:"#44ff88",cursor:"pointer",fontSize:11,borderRadius:8,fontFamily:"monospace",fontWeight:"bold",letterSpacing:1,touchAction:"manipulation"}}>SAVE</button>
          <button onClick={onClose} style={{minWidth:44,minHeight:44,padding:"6px 8px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",color:"#666",cursor:"pointer",fontSize:11,borderRadius:8,fontFamily:"monospace",letterSpacing:1,touchAction:"manipulation"}}>{"\u2715"}</button>
        </div>
      </div>
      {/* Canvas area */}
      <div ref={containerRef} style={{flex:1,position:"relative",cursor:dragIdx!==null?"grabbing":hoverIdx!==null?"grab":"crosshair",userSelect:"none"}}
        onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp} onDoubleClick={handleDblClick} onContextMenu={handleContextMenu}>
        <svg width="100%" height="100%" style={{display:"block"}}>
          {vLines.map((l, i) => (
            <g key={"v"+i}>
              <line x1={PAD_L} y1={l.y} x2={PAD_L+gW} y2={l.y} stroke="rgba(255,255,255,0.04)" strokeWidth={0.5}/>
              <text x={PAD_L-4} y={l.y+3} textAnchor="end" fill="#334" fontSize={7} fontFamily="'Courier New',monospace">{Math.round(l.v)}</text>
            </g>
          ))}
          {beatLines.map((l, i) => (
            <g key={"b"+i}>
              <line x1={l.x} y1={PAD_T} x2={l.x} y2={PAD_T+gH} stroke={l.major?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.02)"} strokeWidth={l.major?1:0.5}/>
              {l.major && <text x={l.x} y={PAD_T+gH+12} textAnchor="middle" fill="#334" fontSize={7} fontFamily="'Courier New',monospace">{l.t.toFixed(0)}</text>}
            </g>
          ))}
          <rect x={PAD_L} y={PAD_T} width={gW} height={gH} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={1} rx={4}/>
          {/* Fill under curve */}
          {curvePath && <path d={curvePath + ` L ${tToX(sorted[sorted.length-1]?.t||0)},${PAD_T+gH} L ${PAD_L},${PAD_T+gH} Z`} fill={param.color+"08"}/>}
          {/* Active curve */}
          {curvePath && <path d={curvePath} fill="none" stroke={param.color} strokeWidth={2} opacity={0.8}/>}
          {/* Segment curve type labels */}
          {sorted.map((p, i) => {
            if (i >= sorted.length - 1) return null;
            const pn = sorted[i+1];
            const cx = (tToX(p.t) + tToX(pn.t)) / 2;
            const cy = PAD_T + gH + 1;
            const curve = p.curve || "linear";
            if (curve === "linear") return null;
            return <text key={"sl"+i} x={cx} y={cy} textAnchor="middle" fill={param.color+"66"} fontSize={7} fontFamily="'Courier New',monospace">{SEGMENT_LABELS[curve]}</text>;
          })}
          {/* Control points */}
          {sorted.map((p, i) => {
            const px = tToX(p.t), py = vToY(p.v);
            const isHover = hoverIdx === i;
            const isDrag = dragIdx === i;
            return (
              <g key={i}>
                <circle cx={px} cy={py} r={isDrag ? 6 : isHover ? 5 : 3.5} fill={isDrag ? "#fff" : param.color} stroke="#fff" strokeWidth={isDrag ? 2 : 1} opacity={isDrag ? 1 : isHover ? 0.9 : 0.7}/>
                {(isHover || isDrag) && <text x={px} y={py-10} textAnchor="middle" fill="#ccc" fontSize={8} fontFamily="'Courier New',monospace">{p.v.toFixed(1)}</text>}
              </g>
            );
          })}
        </svg>
        {/* Segment curve type popup */}
        {segMenu && <div style={{position:"absolute",left:segMenu.x-40,top:segMenu.y-10,background:"rgba(10,14,24,0.9)",backdropFilter:"blur(12px)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,padding:4,display:"flex",gap:3,zIndex:10}}>
          {SEGMENT_CURVES.map(c => (
            <button key={c} onClick={()=>{setPoints(prev=>{const s=[...prev].sort((a,b)=>a.t-b.t);if(segMenu.idx<s.length)s[segMenu.idx]={...s[segMenu.idx],curve:c};return s;});setSegMenu(null);}}
              style={{padding:"3px 8px",fontSize:8,fontWeight:"bold",background:sorted[segMenu.idx]?.curve===c?"rgba(255,255,255,0.1)":"transparent",border:"1px solid "+(sorted[segMenu.idx]?.curve===c?param.color+"66":"rgba(255,255,255,0.08)"),color:sorted[segMenu.idx]?.curve===c?param.color:"#666",borderRadius:5,cursor:"pointer",fontFamily:"'Courier New',monospace",letterSpacing:1}}>
              {SEGMENT_LABELS[c]} {c.toUpperCase()}
            </button>
          ))}
        </div>}
        {presetMenu && <div style={{position:"absolute",top:4,right:4,background:"rgba(10,14,24,0.92)",backdropFilter:"blur(16px)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:8,zIndex:20,minWidth:200,maxHeight:"90%",overflowY:"auto"}}>
          <div style={{fontSize:8,color:"#556",letterSpacing:2,marginBottom:6,padding:"0 4px"}}>CURVE PRESETS</div>
          {presets.length === 0 && <div style={{fontSize:9,color:"#334",padding:"12px 4px",textAlign:"center"}}>No presets saved yet</div>}
          {presets.map((p, i) => (
            <div key={i} onClick={()=>loadPreset(p)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 8px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:6,marginBottom:3,cursor:"pointer",touchAction:"manipulation"}}>
              <div>
                <div style={{fontSize:11,color:"#aab",fontWeight:"bold"}}>{p.name}</div>
                <div style={{fontSize:7,color:"#445"}}>{p.points.length} pts</div>
              </div>
              <button onClick={(e)=>deletePreset(p.name,e)} style={{background:"none",border:"none",color:"#ff444488",cursor:"pointer",fontSize:12,padding:"2px 6px",touchAction:"manipulation"}}>{"\u2715"}</button>
            </div>
          ))}
          <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",marginTop:6,paddingTop:6,display:"flex",gap:4}}>
            <button onClick={()=>{exportCurve();setPresetMenu(false);}} style={{flex:1,minHeight:36,background:"rgba(68,170,255,0.08)",border:"1px solid rgba(68,170,255,0.3)",color:"#44aaff",borderRadius:6,cursor:"pointer",fontSize:9,fontWeight:"bold",fontFamily:"monospace",touchAction:"manipulation"}}>EXPORT</button>
            <button onClick={()=>{importCurve();setPresetMenu(false);}} style={{flex:1,minHeight:36,background:"rgba(255,170,68,0.08)",border:"1px solid rgba(255,170,68,0.3)",color:"#ffaa44",borderRadius:6,cursor:"pointer",fontSize:9,fontWeight:"bold",fontFamily:"monospace",touchAction:"manipulation"}}>IMPORT</button>
          </div>
        </div>}
      </div>
    </div>
  );
}

const EFFECT_TYPES = [
  { id:"chase", label:"Chase", icon:"\u21C6", desc:"Sequential across fixtures" },
  { id:"sine", label:"Sine", icon:"\u223F", desc:"Smooth oscillation" },
  { id:"sCurveWave", label:"S-Wave", icon:"\u2248", desc:"Soft rounded wave" },
  { id:"rampUp", label:"Ramp Up", icon:"\u2197", desc:"Fade min to max" },
  { id:"rampDown", label:"Ramp Down", icon:"\u2198", desc:"Fade max to min" },
  { id:"pulse", label:"Pulse", icon:"\u2022", desc:"Short burst on/off" },
  { id:"strobe", label:"Strobe", icon:"\u26A1", desc:"Rapid on/off" },
  { id:"random", label:"Random", icon:"\u2684", desc:"Random values per beat" },
  { id:"fan", label:"Fan", icon:"\u2261", desc:"Spread values across fixtures" },
  { id:"ballyhoo", label:"Ballyhoo", icon:"\u27F3", desc:"Circular pan+tilt motion" },
  { id:"flyTilt", label:"Fly Tilt", icon:"\u2B06", desc:"Dim+tilt fly in/out" },
  { id:"flyPan", label:"Fly Pan", icon:"\u2B05", desc:"Dim+pan fly in/out" },
  { id:"customCurve", label:"Custom", icon:"\u270E", desc:"Saved curve preset" },
];

function generateEffect({ effectType, fixtures, paramId, speed, offset, crossfade, rangeMin, rangeMax, rangeEnd, easing, startBeat, endBeat }) {
  const cues = [];
  const dur = endBeat - startBeat;
  const n = fixtures.length;
  if (n === 0 || dur <= 0) return cues;
  const param = getParam(paramId);
  const lo = rangeMin ?? param.min, hi = rangeMax ?? param.max;
  const endVal = rangeEnd ?? lo; // end point defaults to start point
  const batchId = genId();

  const spread = offset / 100;

  const xf = (crossfade || 0) / 100;

  if (effectType === "chase") {
    const slotDur = dur / n;
    const xfadeDur = xf * slotDur;
    fixtures.forEach((fx, fi) => {
      const slotStart = startBeat + fi * slotDur;
      const b = Math.max(startBeat, slotStart - xfadeDur / 2);
      const cueDur = Math.min(slotDur + xfadeDur, endBeat - b);
      const fadeIn = xfadeDur > 0 ? (xfadeDur / 2) / cueDur : 0.15;
      const fadeOut = xfadeDur > 0 ? (xfadeDur / 2) / cueDur : 0.15;
      cues.push({ id:genId(), batchId, fixtureId:fx.id, param:paramId, beat:b, duration:cueDur, value:hi, easing:easing||"linear", fadeIn, fadeOut, startValue:lo, endValue:lo });
    });
  } else if (effectType === "sine") {
    // True sine — sampled at key points with sCurve easing for smooth output
    const totalSteps = Math.max(8, Math.round(speed * 8));
    const stepDur = dur / totalSteps;
    fixtures.forEach((fx, fi) => {
      const phaseOff = spread * (fi / n) * 2 * Math.PI;
      for (let s = 0; s < totalSteps; s++) {
        const b = startBeat + s * stepDur;
        const phase = (s / totalSteps) * speed * 2 * Math.PI + phaseOff;
        const nextPhase = ((s + 1) / totalSteps) * speed * 2 * Math.PI + phaseOff;
        const val = lo + (hi - lo) * (0.5 - 0.5 * Math.cos(phase));
        const nextVal = lo + (hi - lo) * (0.5 - 0.5 * Math.cos(nextPhase));
        cues.push({ id:genId(), batchId, fixtureId:fx.id, param:paramId, beat:b, duration:stepDur, value:nextVal, easing:"sCurve", fadeIn:1, fadeOut:0, startValue:val, endValue:nextVal });
      }
    });
  } else if (effectType === "sCurveWave") {
    // Soft rounded wave — 4 cues per cycle with sCurve easing
    const mid = (lo + hi) / 2;
    const quarterValues = [mid, hi, mid, lo];
    const totalQuarters = Math.max(4, Math.round(speed * 4));
    const quarterDur = dur / totalQuarters;
    fixtures.forEach((fx, fi) => {
      const phaseIdx = Math.round(spread * (fi / n) * 4) % 4;
      for (let q = 0; q < totalQuarters; q++) {
        const idx = (q + phaseIdx) % 4;
        const nextIdx = (q + 1 + phaseIdx) % 4;
        const from = quarterValues[idx];
        const to = quarterValues[nextIdx];
        const b = startBeat + q * quarterDur;
        cues.push({ id:genId(), batchId, fixtureId:fx.id, param:paramId, beat:b, duration:quarterDur, value:to, easing:"sCurve", fadeIn:1, fadeOut:0, startValue:from, endValue:to });
      }
    });
  } else if (effectType === "rampUp") {
    const slotDur = dur / n;
    const xfadeDur = xf * slotDur;
    fixtures.forEach((fx, fi) => {
      const slotStart = startBeat + fi * slotDur;
      const b = Math.max(startBeat, slotStart - xfadeDur / 2);
      const cueDur = Math.min(slotDur + xfadeDur, endBeat - b);
      cues.push({ id:genId(), batchId, fixtureId:fx.id, param:paramId, beat:b, duration:cueDur, value:hi, easing:easing||"linear", fadeIn:1, fadeOut:0, startValue:lo, endValue:hi });
    });
  } else if (effectType === "rampDown") {
    const slotDur = dur / n;
    const xfadeDur = xf * slotDur;
    fixtures.forEach((fx, fi) => {
      const slotStart = startBeat + fi * slotDur;
      const b = Math.max(startBeat, slotStart - xfadeDur / 2);
      const cueDur = Math.min(slotDur + xfadeDur, endBeat - b);
      cues.push({ id:genId(), batchId, fixtureId:fx.id, param:paramId, beat:b, duration:cueDur, value:lo, easing:easing||"linear", fadeIn:1, fadeOut:0, startValue:hi, endValue:lo });
    });
  } else if (effectType === "pulse") {
    const cycleLen = speed;
    const pulseDur = Math.min(cycleLen * 0.4, 0.5);
    fixtures.forEach((fx, fi) => {
      const phaseOff = spread * (fi / n) * cycleLen;
      for (let cycle = 0; cycle * cycleLen < dur; cycle++) {
        const t = cycle * cycleLen + phaseOff;
        const b = startBeat + (t % dur);
        if (b >= startBeat && b + pulseDur <= endBeat) cues.push({ id:genId(), batchId, fixtureId:fx.id, param:paramId, beat:b, duration:pulseDur, value:hi, easing:easing||"easeOut", fadeIn:0.05, fadeOut:0.6, startValue:lo, endValue:lo });
      }
    });
  } else if (effectType === "strobe") {
    const strobeDur = 0.125;
    const gap = Math.max(0.125, speed / 8);
    fixtures.forEach((fx, fi) => {
      const phaseOff = spread * (fi / n) * gap;
      for (let cycle = 0; cycle * gap < dur; cycle++) {
        const t = cycle * gap + phaseOff;
        const b = startBeat + (t % dur);
        if (b >= startBeat && b + strobeDur <= endBeat) cues.push({ id:genId(), batchId, fixtureId:fx.id, param:paramId, beat:b, duration:strobeDur, value:hi, easing:"step", fadeIn:0, fadeOut:0, startValue:lo, endValue:lo });
      }
    });
  } else if (effectType === "random") {
    const stepDur = speed / 4;
    fixtures.forEach((fx) => {
      for (let t = 0; t < dur; t += stepDur) {
        const b = startBeat + t;
        const val = Math.round(lo + Math.random() * (hi - lo));
        if (b + stepDur <= endBeat) cues.push({ id:genId(), batchId, fixtureId:fx.id, param:paramId, beat:b, duration:stepDur, value:val, easing:easing||"step", fadeIn:0, fadeOut:0, startValue:val, endValue:val });
      }
    });
  } else if (effectType === "fan") {
    fixtures.forEach((fx, fi) => {
      const val = n > 1 ? Math.round(lo + (hi - lo) * fi / (n - 1)) : Math.round((lo + hi) / 2);
      cues.push({ id:genId(), batchId, fixtureId:fx.id, param:paramId, beat:startBeat, duration:dur, value:val, easing:"linear", fadeIn:0, fadeOut:0, startValue:val, endValue:val });
    });
  } else if (effectType === "flyTilt" || effectType === "flyPan") {
    const movParam = effectType === "flyTilt" ? getParam("tilt") : getParam("pan");
    const dimParam = getParam("dimmer");
    const movParamId = effectType === "flyTilt" ? "tilt" : "pan";
    const movMid = (movParam.min + movParam.max) / 2;
    const movRange = (movParam.max - movParam.min) * 0.4;
    const movStart = movMid + movRange;
    const movEnd = movMid;
    fixtures.forEach((fx, fi) => {
      const delay = spread * (fi / Math.max(1, n - 1)) * dur;
      const cDur = Math.max(0.5, dur - delay);
      const b = startBeat + delay;
      if (b + cDur <= endBeat + 0.01) {
        cues.push({ id:genId(), batchId, fixtureId:fx.id, param:"dimmer", beat:b, duration:cDur, value:dimParam.max, easing:easing||"easeOut", fadeIn:0, fadeOut:0, startValue:dimParam.min, endValue:dimParam.max });
        cues.push({ id:genId(), batchId, fixtureId:fx.id, param:movParamId, beat:b, duration:cDur, value:Math.round(movEnd), easing:easing||"easeOut", fadeIn:0, fadeOut:0, startValue:Math.round(movStart), endValue:Math.round(movEnd) });
      }
    });
  } else if (effectType === "ballyhoo") {
    const cycleLen = speed;
    const steps = 8;
    const stepDur = cycleLen / steps;
    const panParam = getParam("pan"), tiltParam = getParam("tilt");
    const panLo = panParam.min, panHi = panParam.max, panMid = (panLo + panHi) / 2, panR = (panHi - panLo) * 0.3;
    const tiltLo = tiltParam.min, tiltHi = tiltParam.max, tiltMid = (tiltLo + tiltHi) / 2, tiltR = (tiltHi - tiltLo) * 0.3;
    fixtures.forEach((fx, fi) => {
      const phaseOff = spread * (fi / n) * cycleLen;
      for (let t = 0; t < dur; t += stepDur) {
        const b = startBeat + t;
        const phase = ((t + phaseOff) / cycleLen) * Math.PI * 2;
        const panVal = Math.round(panMid + panR * Math.cos(phase));
        const tiltVal = Math.round(tiltMid + tiltR * Math.sin(phase));
        const nextPhase = ((t + stepDur + phaseOff) / cycleLen) * Math.PI * 2;
        if (b + stepDur <= endBeat) {
          cues.push({ id:genId(), batchId, fixtureId:fx.id, param:"pan", beat:b, duration:stepDur, value:panVal, easing:"linear", fadeIn:0, fadeOut:0, startValue:panVal, endValue:Math.round(panMid + panR * Math.cos(nextPhase)) });
          cues.push({ id:genId(), batchId, fixtureId:fx.id, param:"tilt", beat:b, duration:stepDur, value:tiltVal, easing:"linear", fadeIn:0, fadeOut:0, startValue:tiltVal, endValue:Math.round(tiltMid + tiltR * Math.sin(nextPhase)) });
        }
      }
    });
  } else if (effectType === "customCurve") {
    // Load preset from localStorage, apply normalized points as autoPoints
    let presetPts = [];
    try {
      const allPresets = JSON.parse(localStorage.getItem("lumina-curve-presets") || "[]");
      const sel = localStorage.getItem("lumina-fx-curvepreset");
      const preset = allPresets.find(p => p.name === sel);
      if (preset) presetPts = preset.points;
    } catch(e){}
    if (presetPts.length < 2) return cues;
    const range = hi - lo;
    fixtures.forEach((fx, fi) => {
      const phaseOff = spread * (fi / n);
      // Repeat curve based on speed
      const cycles = Math.max(1, Math.round(speed));
      const cycleDur = dur / cycles;
      for (let c = 0; c < cycles; c++) {
        const cycleStart = startBeat + c * cycleDur;
        const expanded = [];
        for (let i = 0; i < presetPts.length - 1; i++) {
          const p = presetPts[i], pn = presetPts[i + 1];
          const curve = p.curve || "linear";
          const steps = curve === "linear" ? 1 : 8;
          for (let s = 0; s <= (i === presetPts.length - 2 ? steps : steps - 1); s++) {
            const frac = s / steps;
            let tNorm = p.t + frac * (pn.t - p.t);
            // Apply phase offset — shift and wrap
            tNorm = (tNorm + phaseOff) % 1;
            const vNorm = curve === "linear" ? p.v + frac * (pn.v - p.v) : p.v + (EASINGS[curve]?.fn || (x=>x))(frac) * (pn.v - p.v);
            expanded.push({ t: tNorm * cycleDur, v: lo + vNorm * range });
          }
        }
        expanded.sort((a, b) => a.t - b.t);
        if (expanded.length >= 2) {
          cues.push({ id:genId(), batchId, fixtureId:fx.id, param:paramId, beat:cycleStart, duration:cycleDur, value:expanded[0].v, easing:"linear", fadeIn:0, fadeOut:0, startValue:expanded[0].v, endValue:expanded[expanded.length-1].v, autoPoints:expanded });
        }
      }
    });
  }
  return cues;
}

      {previewData.length > 0 && <div style={{borderTop:"1px solid #1e222a",paddingTop:4}}>

        <div onClick={e=>e.stopPropagation()} style={{background:"#0e1018",border:"1px solid #e8aa2244",borderRadius:8,padding:16,width:320,boxShadow:"0 8px 40px rgba(0,0,0,0.8)",animation:"popIn 0.2s ease-out"}}>

            <button onClick={()=>doApply(conflictPopup.newCues,conflictPopup.fxList,"merge")} style={{padding:"8px 0",background:"#44ff4422",border:"1px solid #44ff44",color:"#44ff88",borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:"bold",letterSpacing:1}}>MERGE<div style={{fontSize:8,color:"#44ff8888",marginTop:2}}>Keep existing cues, add new on top</div></button>

const SEQ_CATS = [
  { id:"DIM", label:"DIM", color:"#cccccc", params:["dimmer","strobe"] },
  { id:"POS", label:"POS", color:"#44aaff", params:["pan","tilt"] },
  { id:"COL", label:"COL", color:"#ff66aa", params:["cyan","magenta","yellow","white","cto","colorwheel"] },
  { id:"BEAM", label:"BEAM", color:"#ffaa44", params:["zoom","focus","iris","blade_a","blade_a_rot","blade_b","blade_b_rot","blade_c","blade_c_rot","blade_d","blade_d_rot","blade_rot","gobo_a","gobo_a_rot","gobo_b","gobo_b_rot"] },
  { id:"ALL", label:"ALL", color:"#44ffaa", params:null },
];

const SequenceStoragePanel = React.memo(function SequenceStoragePanel({ fixtures, setFixtures, setDmxPatch, sequenceStorage, setSequenceStorage, seqCategory, setSeqCategory, seqStoreMode, setSeqStoreMode, seqClearMode, setSeqClearMode, seqRecallMode, setSeqRecallMode, seqFadeBeats, setSeqFadeBeats, cues, selectedCues, setCues, lastRecalledBatchId, setLastRecalledBatchId, liveValues, playhead, mutedLanes, setMutedLanes, loopStart, loopEnd }) {
  const [seqAssignMode, setSeqAssignMode] = useState(false);
  const [seqAssignSpread, setSeqAssignSpread] = useState(false);
  const [assignPopup, setAssignPopup] = useState(null); // {slotIdx, slotCues, srcFxIds, selTargets:Set}
  const [assignShowIndiv, setAssignShowIndiv] = useState(false);
  const cat = SEQ_CATS.find(c=>c.id===seqCategory)||SEQ_CATS[0];
  const slots = sequenceStorage[seqCategory]||[];
  const fileInputRef = useRef(null);
  const [renameSlot, setRenameSlot] = useState(null); // {index, value}
  const seqColor = "#e8aa22";

  // Seq-only save/load (v2 format)
  const handleSaveSeq = () => {
    const data = { type:"lumina-project", version:2, savedAt:new Date().toISOString(), fixtures, cues, sequenceStorage, mutedLanes:[...mutedLanes] };
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "lumina-seq-" + new Date().toISOString().slice(0,19).replace(/[:.]/g,"-") + ".lumina";
    a.click();
    URL.revokeObjectURL(url);
  };
  const handleLoadSeq = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if(data.type !== "lumina-project") { alert("Not a valid LUMINA file"); return; }
        if(data.cues) setCues(data.cues.map(c => ({...c, id: genId(), batchId: null})));
        if(data.sequenceStorage) setSequenceStorage(data.sequenceStorage);
        if(data.mutedLanes) setMutedLanes(new Set(data.mutedLanes));
      } catch(err) { alert("Failed to load: " + err.message); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const handleClick = (i) => {
    if(seqStoreMode){
      let src = selectedCues&&selectedCues.size>0 ? cues.filter(c=>selectedCues.has(c.id)) : [...cues];
      // Filter by category params
      if(cat.params) src = src.filter(c => cat.params.includes(c.param));
      if(src.length===0) return;
      const stored = { label:"S."+String(i+1).padStart(2,"0"), cues:src.map(c=>({...c,id:null,batchId:null})), storedAt:Date.now(), cueCount:src.length, color:cat.color };
      setSequenceStorage(prev=>{const n={...prev};n[seqCategory]=[...prev[seqCategory]];n[seqCategory][i]=stored;return n;});
      setSeqStoreMode(false);
    } else if(seqClearMode){
      if(!slots[i]) return;
      setSequenceStorage(prev=>{const n={...prev};n[seqCategory]=[...prev[seqCategory]];n[seqCategory][i]=null;return n;});
      setSeqClearMode(false);
    } else if(seqAssignMode) {
      if(!slots[i]) return;
      const slotCues = slots[i].cues;
      const srcFxIds = [...new Set(slotCues.map(c=>c.fixtureId))];
      setAssignPopup({slotIdx:i, slotCues, srcFxIds, selTargets:new Set(fixtures.map(f=>f.id)), spreadVal:1, divideVal:1, editField:null});
    } else {
      if(!slots[i]) return;
      const bid = genId();
      const fade = seqFadeBeats;
      const recalled = slots[i].cues.map(c=>({...c, id:genId(), batchId:bid}));
      // Build crossfade transition cues when fade > 0
      const xfadeCues = [];
      if(fade > 0) {
        // Find target values from the new sequence (use each cue's steady value)
        const newTargets = {};
        recalled.forEach(c => {
          const k = `${c.fixtureId}-${c.param}`;
          newTargets[k] = { fixtureId:c.fixtureId, param:c.param, value:c.value };
        });
        // For every currently live parameter, create a transition cue
        Object.entries(liveValues).forEach(([k, oldVal]) => {
          const idx = k.indexOf("-");
          const fxId = parseInt(k.substring(0, idx));
          const paramId = k.substring(idx + 1);
          const target = newTargets[k];
          const targetVal = target ? target.value : (getParam(paramId)?.min ?? 0);
          if(Math.abs(oldVal - targetVal) > 0.01) {
            xfadeCues.push({
              id:genId(), batchId:bid, fixtureId:fxId, param:paramId,
              beat:playhead, duration:fade,
              value:targetVal, startValue:oldVal, endValue:targetVal,
              fadeIn:1, fadeOut:0, easing:"linear"
            });
          }
        });
      }
      if(seqRecallMode==="replace") {
        if(cat.params) {

          setCues(prev=>[...prev.filter(c=>!cat.params.includes(c.param)), ...recalled, ...xfadeCues]);
        } else {
          // ALL category: replace everything
          setCues([...recalled, ...xfadeCues]);
        }
      } else setCues(prev=>[...prev,...recalled, ...xfadeCues]);
      setLastRecalledBatchId(bid);
    }
  };

            padding:"10px 0",fontSize:13,fontWeight:"bold",letterSpacing:1,

      {assignPopup&&(()=>{
        const ap=assignPopup;

        const nonSrcFx=fixtures.filter(f=>!srcSet.has(f.id));
        const selAllTgt=()=>setAssignPopup(prev=>prev?{...prev,selTargets:new Set(nonSrcFx.map(f=>f.id))}:prev);
        const selNoneTgt=()=>setAssignPopup(prev=>prev?{...prev,selTargets:new Set()}:prev);
        const types=[...new Set(fixtures.map(f=>f.type))];
        const positions=[...new Set(fixtures.map(f=>f.position||"FRONT 1"))];
        const colorGroups=[...new Set(fixtures.map(f=>f.colorGroup||""))].filter(Boolean);
        const toggleGroupTgt=(ids)=>{const nonSrcIds=ids.filter(id=>!srcSet.has(id));setAssignPopup(prev=>{if(!prev)return prev;const s=new Set(prev.selTargets);const allSel=nonSrcIds.every(id=>s.has(id));if(allSel)nonSrcIds.forEach(id=>s.delete(id));else nonSrcIds.forEach(id=>s.add(id));return{...prev,selTargets:s};});};
        // Sort source fixtures by their earliest beat to establish the pattern order
        const srcSorted=[...ap.srcFxIds].sort((a,b)=>{
          const aMin=Math.min(...ap.slotCues.filter(c=>c.fixtureId===a).map(c=>c.beat),Infinity);
          const bMin=Math.min(...ap.slotCues.filter(c=>c.fixtureId===b).map(c=>c.beat),Infinity);
          return aMin-bMin;
        });
        // Group cues by source fixture in pattern order
        const srcCuesByFx={};
        srcSorted.forEach(fxId=>{srcCuesByFx[fxId]=ap.slotCues.filter(c=>c.fixtureId===fxId);});
        // Detect beat step between source fixtures (earliest beat of each)
        const srcBeats=srcSorted.map(fxId=>Math.min(...srcCuesByFx[fxId].map(c=>c.beat)));
        const beatStep=srcSorted.length>1?(srcBeats[srcBeats.length-1]-srcBeats[0])/(srcSorted.length-1):0;
        const baseBeat=srcBeats[0]||0;

        const setApField=(key,val)=>setAssignPopup(prev=>prev?{...prev,[key]:val}:prev);
        // Build normalized template: one set of cues per source fixture, each normalized to beat 0
        const templatesByFx={};
        srcSorted.forEach(fxId=>{
          const fxCues=ap.slotCues.filter(c=>c.fixtureId===fxId);
          const fxBase=fxCues.length>0?Math.min(...fxCues.map(c=>c.beat)):0;
          templatesByFx[fxId]=fxCues.map(c=>({...c,beat:c.beat-fxBase}));
        });
        // Master template: use first source fixture's cue pattern as the template for all targets
        const masterTemplate=templatesByFx[srcSorted[0]]||ap.slotCues.map(c=>({...c,beat:c.beat-baseBeat}));
        const doAssign=(mode)=>{
          // modes: "ok"=plain copy, "spread"=auto even in loop, "all"=include src+auto spread, "spread#"=custom beat offset, "divide#"=grouped spread
          const bid=genId();
          let newCues=[];
          const fixtureOrder=fixtures.map(f=>f.id);
          const tgtIds=[...ap.selTargets].filter(id=>!srcSet.has(id)).sort((a,b)=>fixtureOrder.indexOf(a)-fixtureOrder.indexOf(b));
          // Helper: place masterTemplate cues for a fixture at a given beat position
          const placeCues=(fxId,beatPos)=>{masterTemplate.forEach(c=>{newCues.push({...c,id:genId(),batchId:bid,fixtureId:fxId,beat:beatPos+c.beat});});};
          if(mode==="all"){
            const allIds=[...srcSorted,...tgtIds.filter(id=>!srcSet.has(id))];
            const loopRange=loopEnd-loopStart;
            const step=allIds.length>1?loopRange/allIds.length:0;
            allIds.forEach((tId,i)=>{placeCues(tId,loopStart+step*i);});
          } else if(mode==="spread"){
            if(tgtIds.length===0){setAssignPopup(null);return;}
            const loopRange=loopEnd-loopStart;
            const step=tgtIds.length>1?loopRange/tgtIds.length:0;
            tgtIds.forEach((tId,i)=>{placeCues(tId,loopStart+step*i);});
          } else if(mode==="spread#"){
            if(tgtIds.length===0){setAssignPopup(null);return;}
            const step=ap.spreadVal||1;
            tgtIds.forEach((tId,i)=>{placeCues(tId,loopStart+step*i);});
          } else if(mode==="divide#"){
            if(tgtIds.length===0){setAssignPopup(null);return;}
            const groupSize=Math.max(1,ap.divideVal||1);
            const loopRange=loopEnd-loopStart;
            const numGroups=Math.ceil(tgtIds.length/groupSize);
            const step=numGroups>1?loopRange/numGroups:0;
            tgtIds.forEach((tId,i)=>{
              const groupIdx=Math.floor(i/groupSize);
              placeCues(tId,loopStart+step*groupIdx);
            });
          } else {
            // "ok" mode: copy at original position (loopStart + relative beat)
            if(tgtIds.length===0){setAssignPopup(null);return;}
            tgtIds.forEach((tId)=>{placeCues(tId,baseBeat);});
          }
          if(seqRecallMode==="replace"){
            if(cat.params){setCues(prev=>[...prev.filter(c=>!cat.params.includes(c.param)),...newCues]);}
            else{setCues([...newCues]);}
          }else setCues(prev=>[...prev,...newCues]);
          setLastRecalledBatchId(bid);
          setAssignPopup(null);setSeqAssignMode(false);
        };
        const allNonSrcSelected=nonSrcFx.length>0&&nonSrcFx.every(f=>ap.selTargets.has(f.id));
        const tgtCount=[...ap.selTargets].filter(id=>!srcSet.has(id)).length;
        const btnS=(sel,col)=>({minHeight:40,background:sel?col+"22":"#0c0e12",border:`1px solid ${sel?col:"#252930"}`,color:sel?col:"#555",borderRadius:5,cursor:"pointer",fontSize:11,fontWeight:"bold",display:"flex",alignItems:"center",justifyContent:"center",gap:5,touchAction:"manipulation",padding:"4px 6px"});
        const sepS={borderTop:"1px solid #1e2230",margin:"4px 0"};
        return <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:10001,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setAssignPopup(null)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#0a0c10f0",border:"2px solid #cc44ff44",borderRadius:8,boxShadow:"0 8px 30px rgba(0,0,0,0.9)",padding:18,display:"flex",flexDirection:"column",gap:0,width:480,maxHeight:"90vh"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingBottom:9}}>
              <span style={{fontSize:11,color:"#cc44ff",letterSpacing:2,fontWeight:"bold"}}>ASSIGN</span>
              <button onClick={()=>setAssignPopup(null)} style={{background:"#1c0a16",border:"1px solid #ff444444",color:"#ff6666",cursor:"pointer",fontSize:16,padding:"4px 14px",borderRadius:8,fontWeight:"bold",touchAction:"manipulation"}}>✕</button>
            </div>
            <div style={{flex:1,minHeight:0,overflowY:"auto",display:"flex",flexDirection:"column",gap:9}}>
            <div style={sepS}/>
            <div style={{fontSize:9,color:"#ff4444",letterSpacing:2,fontWeight:"bold"}}>SOURCE</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:4}}>
              {fixtures.filter(f=>srcSet.has(f.id)).map(fx=>{const nm=fx.name;const lines=nm.length>6?[nm.slice(0,6),nm.slice(6,12)]:[nm];return <div key={fx.id} style={{...btnS(true,"#ff4444"),flexDirection:"column",gap:1,padding:"4px 2px",cursor:"default",background:"#ff444422",border:"1px solid #ff4444"}}><div style={{width:8,height:8,borderRadius:"50%",background:"#ff4444"}}/>{lines.map((l,i)=><span key={i} style={{fontSize:8,lineHeight:"10px",color:"#ff6666"}}>{l}</span>)}</div>;})}
            </div>
            <div style={{fontSize:8,color:"#664444"}}>{ap.slotCues.length} cues</div>
            <div style={sepS}/>
            <div style={{fontSize:9,color:"#ddd",letterSpacing:2,fontWeight:"bold"}}>ASSIGN TO</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
              <button onClick={()=>{if(allNonSrcSelected)selNoneTgt();else selAllTgt();}} style={btnS(allNonSrcSelected,"#44ffaa")}>{allNonSrcSelected?"ALL ✓":"ALL"}</button>
              <button onClick={()=>setAssignShowIndiv(!assignShowIndiv)} style={btnS(assignShowIndiv,"#aabbcc")}>FIXTURES {assignShowIndiv?"▲":"▼"}</button>
            </div>
            {assignShowIndiv&&<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:4}}>
              {fixtures.map(fx=>{const isSrc=srcSet.has(fx.id);const sel=ap.selTargets.has(fx.id)&&!isSrc;const nm=fx.name;const lines=nm.length>6?[nm.slice(0,6),nm.slice(6,12)]:[nm];return <button key={fx.id} onClick={()=>toggleTgt(fx.id)} style={{...btnS(isSrc?false:sel,isSrc?"#ff4444":fx.color),flexDirection:"column",gap:1,padding:"4px 2px",opacity:isSrc?0.3:1,cursor:isSrc?"default":"pointer"}}><div style={{width:8,height:8,borderRadius:"50%",background:isSrc?"#ff4444":fx.color,opacity:sel||isSrc?1:0.3}}/>{lines.map((l,i)=><span key={i} style={{fontSize:8,lineHeight:"10px"}}>{l}</span>)}</button>;})}
            </div>}
            {types.length>1&&<><div style={sepS}/><div style={{fontSize:9,color:"#3a3f4c",letterSpacing:2}}>TYPE</div>
            <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(types.length,4)},1fr)`,gap:4}}>
              {types.map(t=>{const ids=fixtures.filter(f=>f.type===t).map(f=>f.id);const nonSrcIds=ids.filter(id=>!srcSet.has(id));const allSel=nonSrcIds.length>0&&nonSrcIds.every(id=>ap.selTargets.has(id));return <button key={t} onClick={()=>toggleGroupTgt(ids)} style={btnS(allSel,"#e8aa22")}>{t}</button>;})}
            </div></>}
            {positions.length>1&&<><div style={sepS}/><div style={{fontSize:9,color:"#3a3f4c",letterSpacing:2}}>POSITION</div>
            <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(positions.length,4)},1fr)`,gap:4}}>
              {positions.map(pos=>{const ids=fixtures.filter(f=>(f.position||"FRONT 1")===pos).map(f=>f.id);const nonSrcIds=ids.filter(id=>!srcSet.has(id));const allSel=nonSrcIds.length>0&&nonSrcIds.every(id=>ap.selTargets.has(id));return <button key={pos} onClick={()=>toggleGroupTgt(ids)} style={btnS(allSel,"#888")}>{pos}</button>;})}
            </div></>}
            {colorGroups.length>0&&<><div style={sepS}/><div style={{fontSize:9,color:"#3a3f4c",letterSpacing:2}}>COLOR GROUP</div>
            <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(colorGroups.length,4)},1fr)`,gap:4}}>
              {colorGroups.map(cg=>{const ids=fixtures.filter(f=>f.colorGroup===cg).map(f=>f.id);const nonSrcIds=ids.filter(id=>!srcSet.has(id));const allSel=nonSrcIds.length>0&&nonSrcIds.every(id=>ap.selTargets.has(id));return <button key={cg} onClick={()=>toggleGroupTgt(ids)} style={btnS(allSel,"#e8aa22")}>{cg}</button>;})}
            </div></>}
            <div style={sepS}/>
            <div style={{fontSize:8,color:"#555",textAlign:"center"}}>{tgtCount} fixture{tgtCount!==1?"s":""} selected</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6,paddingTop:9}}>
              <div>
                <div style={{fontSize:8,color:"#cc44ff88",letterSpacing:2,fontWeight:"bold",marginBottom:3}}>SPREAD <span style={{color:"#cc44ff",fontSize:12,fontWeight:"bold"}}>{ap.spreadVal}b</span></div>
                <GlowSlider min={0.25} max={16} step={0.25} value={ap.spreadVal} onChange={v=>setApField("spreadVal",v)} color="#cc44ff" ticks={8} label="SPREAD"/>
              </div>
              <div>
                <div style={{fontSize:8,color:"#44aaff88",letterSpacing:2,fontWeight:"bold",marginBottom:3}}>DIVIDE <span style={{color:"#44aaff",fontSize:12,fontWeight:"bold"}}>{ap.divideVal}</span></div>
                <GlowSlider min={1} max={16} step={1} value={ap.divideVal} onChange={v=>setApField("divideVal",v)} color="#44aaff" ticks={8} label="DIVIDE"/>
              </div>
            </div>
            {ap.slotCues.length>0&&tgtCount>0&&(()=>{
              const paramIds=[...new Set(ap.slotCues.map(c=>c.param))];
              const fixtureOrder=fixtures.map(f=>f.id);
              const tgtIds=[...ap.selTargets].filter(id=>!srcSet.has(id)).sort((a,b)=>fixtureOrder.indexOf(a)-fixtureOrder.indexOf(b));
              const allIds=[...srcSorted,...tgtIds];
              const loopRange=loopEnd-loopStart;
              if(loopRange<=0||allIds.length===0)return null;
              // Simulate spread# placement for preview
              const groupSize=ap.divideVal>1?Math.max(1,ap.divideVal):0;
              const spreadStep=ap.spreadVal||1;
              const previewCues=[];
              // Source fixtures stay at original position
              srcSorted.forEach(fxId=>{
                ap.slotCues.filter(c=>c.fixtureId===fxId).forEach(c=>{
                  previewCues.push({...c,fixtureId:fxId});
                });
              });
              // Target fixtures: simulate spread positioning
              tgtIds.forEach((tId,i)=>{
                let offset;
                if(groupSize>1){
                  const numGroups=Math.ceil(tgtIds.length/groupSize);
                  const groupIdx=Math.floor(i/groupSize);
                  offset=numGroups>1?(loopRange/numGroups)*groupIdx:0;
                } else {
                  offset=spreadStep*i;
                }
                ap.slotCues.forEach(c=>{
                  previewCues.push({...c,fixtureId:tId,beat:loopStart+offset+(c.beat-baseBeat)});
                });
              });
              // Compute display range
              const dispStart=loopStart;
              const dispEnd=Math.max(loopEnd,Math.max(...previewCues.map(c=>c.beat+c.duration)));
              const dispDur=dispEnd-dispStart;
              if(dispDur<=0)return null;
              const samples=200;
              const lines=[];
              allIds.forEach(fxId=>{
                const fx=fixtures.find(f=>f.id===fxId);
                if(!fx)return;
                const isSrc=srcSet.has(fxId);
                paramIds.forEach((pid,pi)=>{
                  const p=getParam(pid);
                  const fxCues=previewCues.filter(c=>c.fixtureId===fxId&&c.param===pid);
                  if(fxCues.length===0)return;
                  const pRange=p.max-p.min;
                  const pts=[];
                  for(let s=0;s<=samples;s++){
                    const beat=dispStart+(s/samples)*dispDur;
                    let val=p.min;
                    for(const c of fxCues){if(beat>=c.beat&&beat<=c.beat+c.duration){val=interpolateCue(c,beat);break;}}
                    const norm=pRange>0?(val-p.min)/pRange:0;
                    pts.push({x:s/samples,y:1-norm});
                  }
                  lines.push({id:fxId+"_"+pid,color:isSrc?"#ffffff":fx.color,name:fx.name,points:pts,isSrc});
                });
              });
              if(lines.length===0)return null;
              const beatLines=[];
              for(let b=Math.ceil(dispStart);b<=Math.floor(dispEnd);b++){
                beatLines.push((b-dispStart)/dispDur);
              }
              const loopStartX=(loopStart-dispStart)/dispDur;
              const loopEndX=(loopEnd-dispStart)/dispDur;
              return <div style={{background:"#080a0e",border:"1px solid #1e222a",borderRadius:8,overflow:"hidden",marginTop:4}}>
                <div style={{fontSize:7,color:"#cc44ff88",letterSpacing:1,padding:"3px 4px 0",fontWeight:"bold"}}>PREVIEW</div>

              <button onClick={()=>{
                setSequenceStorage(prev=>{const n={...prev};n[seqCategory]=[...(prev[seqCategory]||[])];if(n[seqCategory][renameSlot.index]){n[seqCategory][renameSlot.index]={...n[seqCategory][renameSlot.index],label:renameSlot.value||("S."+String(renameSlot.index+1).padStart(2,"0"))};}return n;});
                setRenameSlot(null);
              }} style={{padding:"12px 14px",fontSize:13,fontWeight:"bold",background:"#0a1a0a",border:"2px solid #44ffaa44",color:"#44ffaa",borderRadius:6,cursor:"pointer",minHeight:44,letterSpacing:2}}>ENTER</button>

});

const defaultCues = [
  {id:genId(),fixtureId:1,param:"dimmer",beat:0,duration:4,value:100,easing:"easeIn",fadeIn:0.3,fadeOut:0.2,startValue:0,endValue:0},

const FixturePadBar = React.memo(function FixturePadBar({ fixtures, cues, setCues, playhead, playheadRef, beatEventRef, audioMode, onParamSelect, midiConnected, setMidiConnected, midiLearn, setMidiLearn, midiMap, setMidiMap, toggleMidi, midiAccessRef, midiActions, midiValueMode, midiModValue, midiLiveMode, midiSettingsOpen, setMidiSettingsOpen, midiAutoConnect }) {
  const PADS_PER_PAGE = 19;
  const [padPage, setPadPage] = useState(0);
  const [activeParam, setActiveParam] = useState("dimmer");
  const [mode, setMode] = useState(null);
  const [heldPads, setHeldPads] = useState(new Set());
  useEffect(()=>{if(midiAutoConnect&&!midiConnected&&toggleMidi)toggleMidi();},[]);
  const [padValues, setPadValues] = useState(() => { const m={}; fixtures.forEach(fx=>{m[fx.id]=100;}); return m; });
  const [quantize, setQuantize] = useState(false);
  const param = getParam(activeParam);
  const paramRef = useRef(param);
  useEffect(()=>{paramRef.current=param;},[param]);
  const heldPadsRef = useRef(heldPads);
  useEffect(()=>{heldPadsRef.current=heldPads;},[heldPads]);
  const modeRef = useRef(mode);
  useEffect(()=>{modeRef.current=mode;},[mode]);
  const activeParamRef = useRef(activeParam);
  useEffect(()=>{activeParamRef.current=activeParam;},[activeParam]);
  const pressStart = useRef({});
  const lastBeatTimeRef = useRef(0);
  const midiMapRef = useRef(midiMap);
  const midiLearnRef = useRef(null);
  const handlePadPressRef = useRef(null);
  const handlePadReleaseRef = useRef(null);
  const midiActionsRef = useRef(midiActions);
  const localActionsRef = useRef({});
  useEffect(() => {
    localActionsRef.current = {"act:rec":()=>setMode(m=>m==="rec"?null:"rec"),"act:erase":()=>setMode(m=>m==="erase"?null:"erase"),"act:quant":()=>setQuantize(q=>!q)};
    midiActionsRef.current = {...midiActions,...localActionsRef.current};
  }, [midiActions, mode]);

  useEffect(() => { midiMapRef.current = midiMap; localStorage.setItem("lumina-midi-map", JSON.stringify(midiMap)); }, [midiMap]);
  useEffect(() => { midiLearnRef.current = midiLearn; }, [midiLearn]);

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  const noteName = n => NOTE_NAMES[n % 12] + (Math.floor(n / 12) - 1);
  const reverseMidiMap = useMemo(() => { const r={}; Object.entries(midiMap).forEach(([key,fxId])=>{ r[fxId]=key; }); return r; }, [midiMap]);
  const midiKeyLabel = k => { if(!k) return null; if(typeof k==="string"&&k.startsWith("cc:")) return "CC"+k.slice(3); const n=parseInt(k); return isNaN(n)?k:noteName(n); };

  // Setup MIDI message handlers when connected
  useEffect(() => {
    if (!midiConnected || !midiAccessRef.current) return;
    const access = midiAccessRef.current;
    const onMessage = e => {
      if (!e.data || e.data.length < 1) return;
      const status = e.data[0];
      if (status === 0xF8 || status === 0xFE) return;
      const note = e.data.length > 1 ? e.data[1] : 0;
      const velocity = e.data.length > 2 ? e.data[2] : 127;
      const cmd = status & 0xf0;
      const mapKey = status >= 0xF8 ? "rt:"+status : cmd === 0xB0 ? "cc:"+note : cmd === 0xF0 ? "sys:"+note : cmd === 0xE0 ? "pb" : ""+note;
      const recordAutoPoint = (newVal) => {
        if (!heldPadsRef.current || heldPadsRef.current.size === 0) return;
        const now = playheadRef.current;
        heldPadsRef.current.forEach(fxId => {
          setPadValues(prev => ({...prev, [fxId]: newVal}));
          if (modeRef.current === "rec" && pressStart.current[fxId]) {
            const ps = pressStart.current[fxId];
            const relTime = Math.max(0, now - ps.beat);
            setCues(prev => prev.map(c => {
              if (c.id !== ps.cueId) return c;
              const pts = c.autoPoints ? [...c.autoPoints] : [];
              pts.push({t: relTime, v: newVal});
              return {...c, value: newVal, autoPoints: pts};
            }));
          }
        });
      };
      if (cmd === 0xB0 && note === 1 && midiModValue) {
        midiModValue.current = velocity;
        if (midiValueMode === "mod") {
          recordAutoPoint(Math.round((velocity/127) * (paramRef.current?.max||255)));
        }
      }
      if (cmd === 0xD0) {
        if (midiValueMode === "aftertouch") {
          recordAutoPoint(Math.round((note/127) * (paramRef.current?.max||255)));
        }
      }
      const learnVal = window.__midiLearnState?.learn || midiLearnRef.current;
      if (window.__midiLearnLock && Date.now() - window.__midiLearnLock < 500) { /* skip duplicate CC from same fader */ }
      else if (learnVal !== null && learnVal !== "waiting" && ((cmd === 0x90 && velocity > 0) || (cmd === 0xB0 && velocity > 0) || cmd === 0xE0 || status >= 0xF8 || (cmd === 0xF0 && velocity > 0))) {
        window.__midiLearnLock = Date.now();
        const fxId = learnVal;
        setMidiMap(prev => {
          const next = {...prev};
          Object.keys(next).forEach(k => { if(next[k] === fxId) delete next[k]; });
          next[mapKey] = fxId;
          return next;
        });
        setMidiLearn(null);
        window.__midiLearnState.learn = null;
        return;
      }
      // LME: broadcast CC to all assigned lanes
      if (cmd === 0xB0 && window.__lmeState?.configRef?.current) {
        const lmeCfg = window.__lmeState.configRef.current;
        const midiCh = (status & 0x0f) + 1;
        if (lmeCfg.cc === note && (!lmeCfg.channel || lmeCfg.channel === midiCh)) {
          if (window.__lmeState.learnMode) {
            window.__lmeState.learnMode = false;
            if (window.__lmeState.onLearn) window.__lmeState.onLearn(note, midiCh);
          } else {
            const assigned = window.__lmeState.assignedRef?.current || {};
            const setOv = window.__lmeState.setOverride;
            if (setOv && Object.keys(assigned).length > 0) {
              setOv(prev => {
                const next = {...prev};
                Object.entries(assigned).forEach(([lk, {pMin, pMax}]) => {
                  next[lk] = Math.round(pMin + (velocity / 127) * (pMax - pMin));
                });
                return next;
              });
            }
          }
        } else if (window.__lmeState.learnMode && (cmd === 0xB0)) {
          const midiCh2 = (status & 0x0f) + 1;
          window.__lmeState.learnMode = false;
          if (window.__lmeState.onLearn) window.__lmeState.onLearn(note, midiCh2);
        }
      }
      if (cmd === 0xB0) {
        const mapped = midiMapRef.current[mapKey];
        if (mapped && typeof mapped === "string" && mapped.startsWith("slider:") && window.__midiSliders) {
          const handler = window.__midiSliders[mapped];
          if (handler) {
            if (window.__midiLearnState?.relative) {
              const delta = velocity - 63;
              if (delta !== 0 && handler.rel) handler.rel(delta);
            } else {
              if (handler.abs) handler.abs(velocity / 127);
            }
            return;
          }
        }
      }
      if ((cmd === 0x90 && velocity > 0) || (cmd === 0xB0 && velocity > 0) || cmd === 0xE0 || status >= 0xF8 || (cmd === 0xF0 && velocity > 0)) {
        const mapped = midiMapRef.current[mapKey];
        if (mapped && typeof mapped === "string" && mapped.startsWith("slider:")) return;
        if (mapped && typeof mapped === "string" && (mapped.startsWith("act:") || mapped.startsWith("pad-"))) {
          if (midiActionsRef.current && midiActionsRef.current[mapped]) midiActionsRef.current[mapped]();
        } else if (mapped && handlePadPressRef.current) handlePadPressRef.current(mapped, velocity);
      }
      if (cmd === 0x80 || (cmd === 0x90 && velocity === 0) || (cmd === 0xB0 && velocity === 0)) {
        const mapped = midiMapRef.current[mapKey];
        if (mapped && typeof mapped === "string" && (mapped.startsWith("act:") || mapped.startsWith("pad-"))) return;
        if (mapped && handlePadReleaseRef.current) handlePadReleaseRef.current(mapped);
      }
    };
    access.inputs.forEach(input => { input.onmidimessage = onMessage; });
    access.onstatechange = () => {
      access.inputs.forEach(input => { input.onmidimessage = onMessage; });
    };
  }, [midiConnected]);

  useEffect(() => {
    if (mode !== "rec" || !audioMode || audioMode === "none" || !beatEventRef?.current) return;
    const check = () => {
      const evt = beatEventRef.current;
      if (evt && evt.time > lastBeatTimeRef.current) {
        lastBeatTimeRef.current = evt.time;
        fixtures.forEach(fx => {
          if (heldPads.has(fx.id)) {
            const val = padValues[fx.id] ?? Math.round((param.min+param.max)/2);
            setCues(prev => [...prev, {id:genId(),fixtureId:fx.id,param:activeParam,beat:evt.beat,duration:0.5,value:val,easing:"linear",fadeIn:0.1,fadeOut:0.1,startValue:param.min,endValue:param.min}]);
          }
        });
      }
    };
    const iv = setInterval(check, 50);
    return () => clearInterval(iv);
  }, [mode, audioMode, heldPads, padValues, activeParam, param, setCues, beatEventRef]);

  // Pre-index cues by fixtureId+param for O(fixtures) lookup instead of O(allCues)
  const padCueIndex = useMemo(() => {
    const idx = new Map();
    cues.forEach(c => {
      const dk = c.fixtureId+"-dimmer";
      if(c.param==="dimmer"){ if(!idx.has(dk)) idx.set(dk,[]); idx.get(dk).push(c); }
      const pk = c.fixtureId+"-"+c.param;
      if(!idx.has(pk)) idx.set(pk,[]);
      if(c.param!=="dimmer") idx.get(pk).push(c);
    });
    return idx;
  }, [cues]);

  const dimmerLive = useMemo(() => {
    const m={};
    fixtures.forEach(fx => {
      const laneCues = padCueIndex.get(fx.id+"-dimmer");
      if(!laneCues) return;
      for(let i=0;i<laneCues.length;i++){
        const c=laneCues[i];
        if(playhead>=c.beat&&playhead<c.beat+c.duration){m[fx.id]=interpolateCue(c,playhead)/100;break;}
      }
    });
    return m;
  }, [padCueIndex, playhead, fixtures]);

  const paramLive = useMemo(() => {
    const m={};
    fixtures.forEach(fx => {
      const laneCues = padCueIndex.get(fx.id+"-"+activeParam);
      if(!laneCues) return;
      for(let i=0;i<laneCues.length;i++){
        const c=laneCues[i];
        if(playhead>=c.beat&&playhead<c.beat+c.duration){m[fx.id]=interpolateCue(c,playhead);break;}
      }
    });
    return m;
  }, [padCueIndex, playhead, activeParam, fixtures]);

  const hasCueForParam = fxId => cues.some(c => c.fixtureId===fxId && c.param===activeParam);
  const isActiveCue = fxId => cues.some(c => c.fixtureId===fxId && c.param===activeParam && playhead>=c.beat && playhead<c.beat+c.duration);

  const handlePadPress = (fxId, velocity) => {
    setHeldPads(prev => new Set([...prev, fxId]));
    const useModWheel = midiValueMode === "mod";
    const velVal = useModWheel ? Math.round((midiModValue.current/127) * param.max) : (velocity !== undefined ? Math.round((velocity/127) * param.max) : null);
    if (velVal !== null) setPadValues(prev => ({...prev, [fxId]: velVal}));
    if (mode==="rec") {
      const rawBeat = playheadRef.current;
      const beatSnap = quantize ? Math.round(rawBeat*4)/4 : rawBeat;
      const val = velVal ?? padValues[fxId] ?? Math.round((param.min+param.max)/2);
      const cueId = genId();
      pressStart.current[fxId] = { beat:beatSnap, cueId };
      setCues(prev => {
        const filtered = prev.filter(c => !(c.fixtureId===fxId&&c.param===activeParam&&rawBeat>=c.beat&&rawBeat<c.beat+c.duration));
        return [...filtered, {id:cueId,fixtureId:fxId,param:activeParam,beat:beatSnap,duration:0.25,value:val,easing:"linear",fadeIn:0.1,fadeOut:0.1,startValue:param.min,endValue:param.min}];
      });
    }
    if (mode==="erase") {
      const rawBeat = playheadRef.current;
      setCues(prev => prev.filter(c => !(c.fixtureId===fxId&&c.param===activeParam&&rawBeat>=c.beat&&rawBeat<c.beat+c.duration)));
    }
  };

  const handlePadRelease = fxId => {
    setHeldPads(prev => { const s=new Set(prev); s.delete(fxId); return s; });
    if (mode==="rec" && pressStart.current[fxId]) {
      const {beat:startBeat, cueId} = pressStart.current[fxId];
      const finalDur = Math.max(0.25, playheadRef.current - startBeat);
      setCues(prev => prev.map(c => c.id===cueId ? {...c, duration:finalDur} : c));

    }

  useEffect(() => { handlePadPressRef.current = handlePadPress; }, [handlePadPress]);
  useEffect(() => { handlePadReleaseRef.current = handlePadRelease; }, [handlePadRelease]);

  const padContainerRef = useRef(null);

function detectBpmFromBuffer(audioBuffer) {
  const rawData = audioBuffer.getChannelData(0);
  const sampleRate = audioBuffer.sampleRate;
  const downsampleFactor = Math.floor(sampleRate / 11025);
  const data = [];
  for (let i = 0; i < rawData.length; i += downsampleFactor) data.push(Math.abs(rawData[i]));
  const dsRate = sampleRate / downsampleFactor;
  const hopSize = Math.floor(dsRate * 0.023);
  const envelope = [];
  for (let i = 0; i < data.length - hopSize; i += hopSize) {
    let e = 0;
    for (let j = 0; j < hopSize; j++) e += data[i + j] * data[i + j];
    envelope.push(Math.sqrt(e / hopSize));
  }
  const diff = envelope.map((v, i) => i === 0 ? 0 : Math.max(0, v - envelope[i - 1]));
  const minLag = Math.floor(60 / (180 * 0.023));
  const maxLag = Math.floor(60 / (60 * 0.023));
  let bestLag = minLag, bestCorr = 0;
  for (let lag = minLag; lag <= Math.min(maxLag, diff.length - 1); lag++) {
    let corr = 0;
    for (let i = 0; i < diff.length - lag; i++) corr += diff[i] * diff[i + lag];
    if (corr > bestCorr) { bestCorr = corr; bestLag = lag; }
  }
  return Math.round(60 / (bestLag * 0.023));
}

function useAudioEngine({ bpm, playing, playhead, audioMode, audioVolume, audioMuted, onLevel, onBeat, onFileLoaded }) {
  const audioCtxRef = useRef(null);
  const analyserRef = useRef(null);
  const gainRef = useRef(null);
  const bufferSourceRef = useRef(null);
  const audioBufferRef = useRef(null);
  const fileStartTimeRef = useRef(0);
  const fileStartBeatRef = useRef(0);
  const detectedBpmRef = useRef(null);
  const micStreamRef = useRef(null);
  const micSourceRef = useRef(null);
  const analysisFrameRef = useRef(null);
  const prevEnergyRef = useRef(0);
  const beatCooldownRef = useRef(0);
  const playingRef = useRef(false);
  const [ctxReady, setCtxReady] = useState(false);
  playingRef.current = playing;

  const ensureContext = useCallback(() => {
    if (!audioCtxRef.current) {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtxRef.current = ctx;
      const analyser = ctx.createAnalyser();
      analyser.fftSize = 2048;
      analyser.smoothingTimeConstant = 0.8;
      analyserRef.current = analyser;
      const gain = ctx.createGain();
      gain.gain.value = audioVolume;
      gainRef.current = gain;
      gain.connect(analyser);
      analyser.connect(ctx.destination);
      setCtxReady(true);
    }
    if (audioCtxRef.current.state === 'suspended') audioCtxRef.current.resume();
    return audioCtxRef.current;
  }, []);

  useEffect(() => {
    if (gainRef.current && audioCtxRef.current) {
      gainRef.current.gain.setValueAtTime(audioMuted ? 0 : audioVolume, audioCtxRef.current.currentTime);
    }
  }, [audioVolume, audioMuted]);

  const loadFile = useCallback(async (file) => {
    const ctx = ensureContext();
    const arrayBuffer = await file.arrayBuffer();
    const decoded = await ctx.decodeAudioData(arrayBuffer);
    audioBufferRef.current = decoded;
    const rawData = decoded.getChannelData(0);
    const numPeaks = 2000;
    const blockSize = Math.floor(rawData.length / numPeaks);
    const peaks = new Float32Array(numPeaks);
    for (let i = 0; i < numPeaks; i++) {
      let max = 0;
      for (let j = 0; j < blockSize; j++) {
        const abs = Math.abs(rawData[i * blockSize + j]);
        if (abs > max) max = abs;
      }
      peaks[i] = max;
    }
    let detectedBpm = null;
    try { detectedBpm = detectBpmFromBuffer(decoded); } catch(e) {}
    detectedBpmRef.current = detectedBpm;
    const durationBeats = detectedBpm ? (decoded.duration / 60) * detectedBpm : (decoded.duration / 60) * bpm;
    if (onFileLoaded) onFileLoaded({ buffer: decoded, peaks, durationBeats, detectedBpm, fileName: file.name });
  }, [bpm, ensureContext, onFileLoaded]);

  const startFilePlayback = useCallback((fromBeat) => {
    const ctx = audioCtxRef.current;
    if (!ctx || !audioBufferRef.current) return;
    if (bufferSourceRef.current) { try { bufferSourceRef.current.stop(); } catch(e){} bufferSourceRef.current.disconnect(); }
    const source = ctx.createBufferSource();
    source.buffer = audioBufferRef.current;
    const detBpm = detectedBpmRef.current;
    const rate = detBpm ? bpm / detBpm : 1;
    source.playbackRate.value = rate;
    source.connect(gainRef.current);
    const offsetSeconds = detBpm ? Math.max(0, (fromBeat / detBpm) * 60) : Math.max(0, (fromBeat / bpm) * 60);
    fileStartTimeRef.current = ctx.currentTime;
    fileStartBeatRef.current = fromBeat;
    source.start(0, Math.min(offsetSeconds, audioBufferRef.current.duration));
    bufferSourceRef.current = source;
  }, [bpm]);

  const stopFilePlayback = useCallback(() => {
    if (bufferSourceRef.current) { try { bufferSourceRef.current.stop(); } catch(e){} }
  }, []);

  const seekTo = useCallback((beat) => {
    if (audioCtxRef.current && audioBufferRef.current && playingRef.current) {
      if (bufferSourceRef.current) { try { bufferSourceRef.current.stop(); } catch(e){} }
      startFilePlayback(beat);
    }
  }, [startFilePlayback]);

  const getPlaybackBeat = useCallback(() => {
    if (!audioCtxRef.current || !bufferSourceRef.current) return null;
    const elapsed = audioCtxRef.current.currentTime - fileStartTimeRef.current;
    return fileStartBeatRef.current + (elapsed * bpm) / 60;
  }, [bpm]);

  const startMic = useCallback(async () => {
    const ctx = ensureContext();
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      micStreamRef.current = stream;
      const source = ctx.createMediaStreamSource(stream);
      source.connect(analyserRef.current);
      micSourceRef.current = source;
    } catch(e) { console.warn('Mic access denied:', e); }
  }, [ensureContext]);

  const stopMic = useCallback(() => {
    if (micSourceRef.current) { micSourceRef.current.disconnect(); micSourceRef.current = null; }
    if (micStreamRef.current) { micStreamRef.current.getTracks().forEach(t => t.stop()); micStreamRef.current = null; }
  }, []);

  useEffect(() => {
    if (audioMode === 'none') {
      cancelAnimationFrame(analysisFrameRef.current);
      return;
    }
    if (!analyserRef.current) {
      ensureContext();
      return;
    }
    const analyser = analyserRef.current;
    const dataArray = new Uint8Array(analyser.frequencyBinCount);
    const freqArray = new Uint8Array(analyser.frequencyBinCount);
    const analyse = () => {
      if (!analyserRef.current) return;
      analyserRef.current.getByteTimeDomainData(dataArray);
      let sum = 0;
      for (let i = 0; i < dataArray.length; i++) { const v = (dataArray[i] - 128) / 128; sum += v * v; }
      const rms = Math.sqrt(sum / dataArray.length);
      if (onLevel) onLevel(rms);
      analyserRef.current.getByteFrequencyData(freqArray);
      let lowEnergy = 0;
      for (let i = 0; i < 10; i++) lowEnergy += freqArray[i];
      lowEnergy /= 10;
      const now = performance.now();
      if (lowEnergy > prevEnergyRef.current * 1.3 && now > beatCooldownRef.current && lowEnergy > 20) {
        if (onBeat) onBeat();
        beatCooldownRef.current = now + (60000 / (bpm || 120)) * 0.4;
      }
      prevEnergyRef.current = prevEnergyRef.current * 0.85 + lowEnergy * 0.15;
      analysisFrameRef.current = requestAnimationFrame(analyse);
    };
    analysisFrameRef.current = requestAnimationFrame(analyse);
    return () => cancelAnimationFrame(analysisFrameRef.current);
  }, [audioMode, bpm, onLevel, onBeat, ctxReady, ensureContext]);

  useEffect(() => {
    if (audioMode === 'mic') { ensureContext(); startMic(); }
    else stopMic();
    if (audioMode === 'file') ensureContext();
  }, [audioMode, startMic, stopMic, ensureContext]);

  useEffect(() => {
    return () => { stopMic(); stopFilePlayback(); };
  }, []);

  return { loadFile, startFilePlayback, stopFilePlayback, seekTo, getPlaybackBeat, ensureContext };
}

const WaveformCanvas = React.memo(function WaveformCanvas({ peaks, durationBeats, beatWidth, zoom, scrollLeft, width, height, playhead, loopStart, loopEnd, loopEnabled }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas || !peaks) return;
    const ctx = canvas.getContext('2d');
    canvas.width = width;
    canvas.height = height;
    ctx.clearRect(0, 0, width, height);
    const totalW = durationBeats * beatWidth * zoom;
    const peakW = totalW / peaks.length;
    const startPeak = Math.max(0, Math.floor((scrollLeft / totalW) * peaks.length));
    const endPeak = Math.min(peaks.length, Math.ceil(((scrollLeft + width) / totalW) * peaks.length));
    ctx.strokeStyle = '#e8aa2255';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = startPeak; i < endPeak; i++) {
      const x = (i * peakW) - scrollLeft;
      const h = peaks[i] * height * 0.9;
      ctx.moveTo(x, (height - h) / 2);
      ctx.lineTo(x, (height + h) / 2);
    }
    ctx.stroke();
    if (loopEnabled) {
      const ls = loopStart * beatWidth * zoom - scrollLeft;
      const le = loopEnd * beatWidth * zoom - scrollLeft;
      ctx.fillStyle = 'rgba(68,255,170,0.06)';
      ctx.fillRect(ls, 0, le - ls, height);
    }
    const phX = playhead * beatWidth * zoom - scrollLeft;
    ctx.fillStyle = '#ff333388';
    ctx.fillRect(phX - 0.5, 0, 1, height);
  }, [peaks, durationBeats, beatWidth, zoom, scrollLeft, width, height, playhead, loopStart, loopEnd, loopEnabled]);
  return <canvas ref={canvasRef} style={{position:'absolute',top:0,left:0,width:width,height:height,pointerEvents:'none'}} />;
});
